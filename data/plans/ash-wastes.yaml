region: ash-wastes
name: 재의 황무지
description: |-
  마왕 영토의 깊은 곳. 잿빛 모래 아래 마왕 침식의 결이 흙 깊숙이 닿아 있다.
  이름을 잊은 자들 — 광기 부대 — 이 거점으로 삼은 폐허.
entry: fa-arrive
boss: fa-corrupted

nodes:
  - id: fa-arrive
    type: encounter
    beat: 황무지 입구. 끝없는 잿빛 모래. 빛이 모래 위에서 한 박자 늦게 닿음. 이방인 혼자.
    personas: [narrator]
    toneTarget: 1지역 안개, 2지역 폐허와 다른 결. 광활함 + 잿빛 + 빛의 어긋남. 차가움 대신 무감각.
    previous: []
    next: [fa-watcher]
    choices:
      - id: arrive-look
        label: 모래 위를 살펴본다
        outcome:
          knowledgeGain: [ash-wastes-glimpse]
          nextNodeId: fa-watcher
      - id: arrive-walk
        label: 그냥 들어간다
        outcome:
          nextNodeId: fa-watcher

  - id: fa-watcher
    type: event
    beat: 수상자가 다시 등장 — 마왕 영토 깊이의 단서. "여긴 마왕이 사람의 마음에 닿는 곳이다." 정체는 안 흘림.
    personas: [narrator, sujangja]
    toneTarget: 수상자의 단서가 무거움. 마왕이 단순 적이 아니라 사람의 마음에 닿는 자라는 결.
    previous: [fa-arrive]
    next: [fa-fork]
    echoes:
      - condition:
          knowledge: trusted-stranger
        text: |-
          수상자가 잠깐 멈춘다.

          수상자: "...너의 문은 일찍 열렸지. 잠그는 법도 너에게 있다."
      - condition:
          knowledge: rejected-stranger
        text: |-
          수상자: "믿지 않아도 된다. 다만 닫아 두기는 하라."
      - condition:
          knowledge: fled-shadow
        text: |-
          수상자: "산맥에서 한 번 등을 돌린 자도, 여기선 등을 돌릴 곳이 없다."
    choices:
      - id: watcher-listen
        label: 수상자의 말을 듣는다
        outcome:
          knowledgeGain: [mawang-deep]
          nextNodeId: fa-fork
      - id: watcher-ignore
        label: 지나친다
        outcome:
          nextNodeId: fa-fork

  - id: fa-fork
    type: encounter
    beat: 갈림길. 모래 위로 가는 광활한 길 vs 모래 아래로 내려가는 동굴 입구. 이방인 혼자.
    personas: [narrator]
    toneTarget: 두 길의 무게 — 노출 vs 어둠. 침묵의 결단.
    previous: [fa-watcher]
    next: [fa-dune, fa-cavern]
    choices:
      - id: fork-dune
        label: 모래 위 길로 간다
        outcome:
          nextNodeId: fa-dune
      - id: fork-cavern
        label: 동굴 입구로 간다
        outcome:
          nextNodeId: fa-cavern

  - id: fa-dune
    type: encounter
    beat: 모래 언덕 위. 광활. 멀리서 모래 폭풍이 다가옴. 이방인 혼자.
    personas: [narrator]
    toneTarget: 광활함 + 임박한 위협. 모래 폭풍의 시각/소리가 점점 가까워짐.
    previous: [fa-fork]
    next: [fa-storm]
    choices:
      - id: dune-direct
        label: 곧장 가로지른다
        outcome:
          nextNodeId: fa-storm
      - id: dune-watch
        label: 주변을 살피며 간다
        outcome:
          nextNodeId: fa-storm

  - id: fa-storm
    type: combat
    beat: 모래 폭풍 안. 시야 잃음. 모래가 살을 갈라낼 듯. 이방인 혼자.
    personas: [narrator]
    toneTarget: 자연의 폭력성. 신체적 비용 또는 정신적 비용 — 어느 쪽이든 통과해야 함.
    previous: [fa-dune]
    next: [fa-shrine]
    choices:
      - id: storm-shelter
        label: 낮게 엎드린다
        outcome:
          statDelta:
            mana: -1
          nextNodeId: fa-shrine
      - id: storm-press
        label: 그냥 통과한다
        outcome:
          statDelta:
            hp: -1
          nextNodeId: fa-shrine

  - id: fa-shrine
    type: rest
    beat: 폭풍이 지나가고, 모래에 반쯤 묻힌 사당이 드러남. 옛 신앙의 흔적. 이름은 새겨지지 않음.
    personas: [narrator]
    toneTarget: 폭풍 직후의 정적. 사당은 비어 있지만 누군가가 마지막으로 외운 결이 남음.
    previous: [fa-storm]
    next: [fa-converge]
    choices:
      - id: shrine-pray
        label: 한 줄을 외운다
        outcome:
          knowledgeGain: [forgotten-shrine]
          nextNodeId: fa-converge
      - id: shrine-pass
        label: 그저 지나친다
        outcome:
          nextNodeId: fa-converge

  - id: fa-cavern
    type: encounter
    beat: 동굴 진입. 어둠 + 차가움. 이방인 혼자. 위에서 모래 흘러내리는 소리.
    personas: [narrator]
    toneTarget: 어둠 + 좁음. 인공적이 아닌, 자라난 결. 마왕의 영토 깊은 곳으로 들어감.
    previous: [fa-fork]
    next: [fa-whisper]
    choices:
      - id: cavern-deep
        label: 더 깊이 들어간다
        outcome:
          nextNodeId: fa-whisper
      - id: cavern-listen
        label: 잠시 멈춰 듣는다
        outcome:
          nextNodeId: fa-whisper

  - id: fa-whisper
    type: event
    beat: 광기 부대 흔적 발견 — 자아 잃은 자들의 짧은 음절이 너의 머릿속에 닿음. 마왕의 정신 조작이 사람의 마음에 닿았다는 첫 증거. 이방인 혼자.
    personas: [narrator, corrupted-one]
    toneTarget: 인간의 비극. 광기 부대는 화내지 않음, 그저 자아가 없음. 마왕의 정신 조작 능력이 처음으로 명확히 드러남. 4지역 환각 마법 build-up.
    previous: [fa-cavern]
    next: [fa-mirror]
    choices:
      - id: whisper-resist
        label: 귀를 닫는다
        outcome:
          statDelta:
            mana: -1
          nextNodeId: fa-mirror
      - id: whisper-listen
        label: 들어본다
        outcome:
          statDelta:
            mana: -2
          knowledgeGain: [corrupted-whisper]
          nextNodeId: fa-mirror

  - id: fa-mirror
    type: event
    beat: 거울 면 발견 — 흑요석 또는 광이 잘 닦인 돌. 거울에 비친 너는 한 걸음 짧음 — 너도 잠식될 수 있다는 가능성. 4지역(꿈꾸는 도시) 환각 build-up. 이방인 혼자.
    personas: [narrator]
    toneTarget: 자기 잠식의 가능성을 직면. 무서움보다 두려움. V1.1 4지역 보스 단서 미리 흘림 (마왕의 환각 능력).
    previous: [fa-whisper]
    next: [fa-converge]
    choices:
      - id: mirror-look
        label: 거울을 본다
        outcome:
          knowledgeGain: [mirror-self]
          nextNodeId: fa-converge
      - id: mirror-avoid
        label: 지나친다
        outcome:
          nextNodeId: fa-converge

  - id: fa-converge
    type: encounter
    beat: 두 길이 만남. 광기 부대의 거점이 가까워짐. 잠식 결이 점점 짙어짐. 이방인 혼자.
    personas: [narrator]
    toneTarget: 보스 직전의 무게. 자아 잃은 자들의 무리가 가까이 있음. 짧은 음절들이 멀리서 들림.
    previous: [fa-shrine, fa-mirror]
    next: [fa-corrupted]
    choices:
      - id: conv-press
        label: 직선으로 간다
        outcome:
          nextNodeId: fa-corrupted
      - id: conv-careful
        label: 조심스럽게 다가간다
        outcome:
          knowledgeGain: [mawang-deep]
          nextNodeId: fa-corrupted

  - id: fa-corrupted
    type: boss
    beat: 잠식된 자 보스 — 옛 영웅, 자기 이름 잊음. 광기 부대 우두머리. 적개심 X, 슬픔 X — 무감한 비틀림. 클래스별 다른 결 한 줄.
    personas: [narrator, corrupted-one]
    toneTarget: 보스전 정점 + 인간 비극. 그림자 사령관(슬픔)과 다른 결 — 무감각 + "너도 곧 잊을 것" 결. 광기 부대는 무리로 묘사 (개별 voice X).
    previous: [fa-converge]
    next: [fa-resolution]
    echoes:
      - condition:
          knowledge: fled-tree
        text: |-
          잠식된 자: "...물러나는 법을 아는군. 그러면 잊는 일도 빠를 것이다."
      - condition:
          knowledge: fled-shadow
        text: |-
          잠식된 자: "...한 번 등을 돌린 자가 또 한 번 등을 돌렸다. 세 번째는 너 자신을 등진다."
      - condition:
          knowledge: templar-creed
        text: |-
          잠식된 자: "...옛 신앙의 결이 너에게 머물러 있구나. 그것이 너의 가벼운 무게다."
    choices:
      - id: corrupted-warrior
        label: 검으로 맞선다
        condition:
          class: warrior
        outcome:
          statDelta:
            hp: -2
          nextNodeId: fa-resolution
      - id: corrupted-mage
        label: 룬으로 그의 잠식을 끊는다
        condition:
          class: mage
        outcome:
          statDelta:
            mana: -2
          nextNodeId: fa-resolution
      - id: corrupted-flee
        label: 도망친다
        outcome:
          knowledgeGain: [fled-corrupted]
          nextNodeId: fa-resolution

  - id: fa-resolution
    type: ending
    beat: 3지역 끝. 잠식된 자 처치/도주 후 그의 마지막 한 줄. 수상자 등장 — 4지역(꿈꾸는 도시) 암시 ("거기선 마왕의 환각이 사람 전체를 가둔다"). 이방인은 마왕의 정신 조작 능력의 깊이를 처음으로 가늠함.
    personas: [narrator, corrupted-one, sujangja]
    toneTarget: 결판 정서 + 무감각의 무게. 잠식된 자의 마지막 한 마디는 짧음 ("이게 끝이다" 결). 수상자는 꿈꾸는 도시 가리킴 — 사람 전체가 환각에 갇힌 곳. 마지막 단락은 개발용 메타 마커.
    previous: [fa-corrupted]
    next: []
    choices: []
