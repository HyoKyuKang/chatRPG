region: dawn-spire
name: 새벽의 첨탑
description: |-
  옛 마법사들의 자리, 지금은 마왕의 옥좌. 이방인의 마지막 길.
  회색의 자의 정체가 드러나고, 3 엔딩 분기점이 있다.
entry: ds-arrive
boss: ds-mawang

nodes:
  - id: ds-arrive
    type: encounter
    beat: 첨탑 입구 도착. 차가운 새벽 빛. 4지역 도시 너머에서 솟아 있음. 이방인 혼자.
    personas: [narrator]
    toneTarget: 마지막 자리의 무게. 차가움 + 새벽 빛. 1~4지역의 결들이 다 모이는 자리.
    previous: []
    next: [ds-watcher]
    choices:
      - id: arrive-look
        label: 첨탑을 올려다본다
        outcome:
          knowledgeGain: [dawn-spire-glimpse]
          nextNodeId: ds-watcher
      - id: arrive-walk
        label: 그냥 들어간다
        outcome:
          nextNodeId: ds-watcher

  - id: ds-watcher
    type: event
    beat: 회색의 자 마지막 평소 등장 (reveal 직전). "...곧 알게 된다." 그가 너의 옆에 잠시 선다.
    personas: [narrator, gray-one]
    toneTarget: 회색의 자가 마지막으로 정체를 가린 채 등장. 무거움 — 그도 알고 있다, 다음에 reveal될 것.
    previous: [ds-arrive]
    next: [ds-ascend]
    echoes:
      - condition:
          knowledge: trusted-stranger
        text: |-
          회색의 자: "...너는 일찍부터 나를 따랐지. 곧 그 이유를 알게 된다."
      - condition:
          knowledge: rejected-stranger
        text: |-
          회색의 자: "...거절한 자에게도, 결국 같은 곳에서 만난다."
    choices:
      - id: watcher-listen
        label: 회색의 자의 말을 듣는다
        outcome:
          nextNodeId: ds-ascend
      - id: watcher-ascend
        label: 그를 두고 오른다
        outcome:
          nextNodeId: ds-ascend

  - id: ds-ascend
    type: encounter
    beat: 첨탑을 오르기 시작. 계단에 옛 이름들이 새겨져 있음 — 지나간 자들의 자국. 가지 진입 (벽감 / 새김 결) 두 개 추가 — gate 없음.
    personas: [narrator]
    toneTarget: 오름의 무게. 계단마다 옛 자들의 흔적. 이방인이 너 하나가 아니었음의 첫 단서. 가지 분기는 무게보다 호흡 — 오름에서 잠깐 비껴남.
    previous: [ds-watcher]
    next: [ds-floor-illusion, ds-rest-alcove, ds-discovery-engraving]
    choices:
      - id: ascend-read
        label: 계단의 이름들을 읽는다
        outcome:
          knowledgeGain: [previous-strangers]
          nextNodeId: ds-floor-illusion
      - id: ascend-press
        label: 곧장 오른다
        outcome:
          nextNodeId: ds-floor-illusion
      - id: ascend-alcove
        label: 옆 벽감의 결을 따라간다
        outcome:
          nextNodeId: ds-rest-alcove
      - id: ascend-side-engraving
        label: 벽의 작은 새김을 살핀다
        outcome:
          nextNodeId: ds-discovery-engraving

  - id: ds-floor-illusion
    type: event
    beat: 1층 — 마왕의 환각 발현. 옛 시대 첨탑 광경 (마법사들이 살던 시대) 잠시 보임. 4지역 환각 결 콜백.
    personas: [narrator, mawang]
    toneTarget: 환각의 결 — 옛 시대가 잠시 비침. 마왕이 너를 시험하는 결 (직접 등장 X, 환각만). 4지역 톤 회상.
    previous: [ds-ascend]
    next: [ds-floor-strangers]
    choices:
      - id: illusion-watch
        label: 환영을 본다
        outcome:
          statDelta:
            mana: -1
          knowledgeGain: [old-ages]
          nextNodeId: ds-floor-strangers
      - id: illusion-press
        label: 환영을 지나친다
        outcome:
          nextNodeId: ds-floor-strangers

  - id: ds-floor-strangers
    type: event
    beat: 2층 — 이전 이방인들의 흔적. 무덤 또는 기록. 자기 희생을 골랐던 자들의 결만 남음.
    personas: [narrator]
    toneTarget: 이방인의 정체 단서 — 너 하나가 아니었다. 무거움. 회색의 자 reveal 직전 build-up.
    previous: [ds-floor-illusion]
    next: [ds-floor-mages]
    echoes:
      - condition:
          knowledge: previous-strangers
        text: |-
          계단의 이름들이 여기서 다시 너에게 닿는다. 그들 중 하나가 너의 어깨에 손을 얹은 듯한 결.
    choices:
      - id: strangers-look
        label: 흔적을 자세히 본다
        outcome:
          knowledgeGain: [previous-strangers]
          nextNodeId: ds-floor-mages
      - id: strangers-press
        label: 곧장 다음 층으로
        outcome:
          nextNodeId: ds-floor-mages

  - id: ds-floor-mages
    type: event
    beat: 3층 — 옛 마법사들의 흔적. 베일런 노사가 떠난 이유 — 그의 옛 동료들 모두 마왕에 잠식됨.
    personas: [narrator]
    toneTarget: 베일런의 옛 동료들의 결 — 그가 첨탑을 떠난 이유. 마왕의 정신 조작이 첨탑까지 닿았다.
    previous: [ds-floor-strangers]
    next: [ds-throne]
    echoes:
      - condition:
          knowledge: bayren-respect
        text: |-
          베일런 노사가 너에게 룬을 가르쳤을 때의 결이 떠오른다. 그의 한숨이 이 자리에서 무엇을 떠올린 것이었는지 너는 이제 안다.
    choices:
      - id: mages-witness
        label: 옛 동료들의 흔적을 본다
        outcome:
          knowledgeGain: [bayren-tower-secret]
          nextNodeId: ds-throne
      - id: mages-pass
        label: 그저 지나친다
        outcome:
          nextNodeId: ds-throne

  - id: ds-throne
    type: event
    beat: 옥좌실 입구. 회색의 자가 옆에 서 있음. 그가 자기 정체를 말한다 — "나는 너 이전의 자다."
    personas: [narrator, gray-one]
    toneTarget: 회색의 자 reveal의 정점. 무거움 + 안도 + 슬픔. 그가 너에게 봉인 가능성 (희생 엔딩) 흘리지만 추천 X.
    previous: [ds-floor-mages]
    next: [ds-mawang]
    choices:
      - id: throne-listen
        label: 그의 말을 듣는다
        outcome:
          knowledgeGain: [watcher-revealed]
          nextNodeId: ds-mawang
      - id: throne-question
        label: 그에게 묻는다
        outcome:
          knowledgeGain: [watcher-revealed]
          nextNodeId: ds-mawang

  - id: ds-mawang
    type: boss
    beat: 마왕 첫 등장. 옥좌에서 일어남. "또 왔구나." 적개심 X — 인식. narrator 가 그의 본질("한때 사람이었던") / 감정("분노 없음, 정중함") / 너의 내면("너 자신의 끝을 본다") 직접 단언 X — 외부 결(평탄한 목소리, 한 박자도 안 흔들림, 시선이 늦게 돌아옴) 으로만.
    personas: [narrator, mawang]
    toneTarget: 마왕의 첫 등장. 사령관(슬픔), 잠식된 자(무감), 잠든 왕(모름)과 다른 결 — **인식 + 비극적 깊이**. 그도 한때 이방인이었음의 결은 그의 대사로만 직접, narrator 는 외부 동작/시선의 결로 비춤.
    previous: [ds-throne]
    next: [ds-choice]
    echoes:
      - condition:
          knowledge: warrior-awakened
        text: |-
          마왕: "...칼은 약하다. 그러나 너는 그것을 알면서도 들었군."
      - condition:
          knowledge: mage-awakened
        text: |-
          마왕: "...룬을 외운 자가 또 왔다. 베일런 그가 너에게 가르쳤는가."
      - condition:
          knowledge: chose-wake
        text: |-
          마왕: "...도시를 깨운 자로구나. 시민들의 비명이 너의 등 뒤에서 따라왔겠지."
    choices:
      - id: mawang-meet
        label: 그를 마주본다
        outcome:
          heroEncounter: mawang
          knowledgeGain: [mawang-glimpse]
          nextNodeId: ds-choice
      - id: mawang-pause
        label: 잠시 멈춘다
        outcome:
          heroEncounter: mawang
          knowledgeGain: [mawang-glimpse]
          nextNodeId: ds-choice

  - id: ds-choice
    type: event
    beat: 3 엔딩 분기점. 마왕 처치 / 배신 (마왕 합류) / 자기 희생 (회색의 자처럼 봉인). 마왕은 너를 막지 않는다.
    personas: [narrator, mawang, gray-one]
    toneTarget: 가장 무거운 자리. 무게는 마왕 대사 ("끝은 어차피 같다 — 형태만 다르다") 와 외부 결 (셋의 숨, 손의 한 박자 멈춤, 공기의 길어짐) 으로만. narrator 가 도덕적 단언 ("어느 쪽도 가볍지 않다") X — 외부 결로 무게 비춤.
    previous: [ds-mawang]
    next: [ds-ending-defeat, ds-ending-betrayal, ds-ending-sacrifice]
    choices:
      - id: choice-defeat
        label: 마왕을 처치한다
        outcome:
          knowledgeGain: [chose-defeat]
          nextNodeId: ds-ending-defeat
      - id: choice-betray
        label: 마왕에 합류한다
        outcome:
          knowledgeGain: [chose-betrayal]
          nextNodeId: ds-ending-betrayal
      - id: choice-sacrifice
        label: 자기 자신을 봉인한다
        outcome:
          knowledgeGain: [chose-sacrifice]
          nextNodeId: ds-ending-sacrifice

  - id: ds-ending-defeat
    type: ending
    beat: 마왕 처치 엔딩. 영웅적 승리 — but 비극적. 다음 이방인이 또 올 것 (세계는 끝나지 않음). 비극은 narrator 의 직접 단언 X — 외부 결 (탑이 그 자리에 그대로 남음, 발걸음만 멀어짐, 등 뒤 계단 소리) 로만.
    personas: [narrator, mawang]
    toneTarget: 영웅적이지만 비극적. 마왕의 마지막 한 마디 ("...너도 자기 자리에 서게 된다."). 회색의 자 침묵 — narrator 가 그의 과거/내면 ("같은 칼을 들었던 자의 침묵") 단언 X, 외부 자세 ("한 자세 그대로") 로만 비춤.
    previous: [ds-choice]
    next: []
    choices: []

  - id: ds-ending-betrayal
    type: ending
    beat: 배신 엔딩. 마왕에 합류 — 너는 다음 마왕이 된다. 어둠의 길 / Renegade 결. narrator 가 마왕 감정 단언 ("분노 없이, 오래 기다린 자의 눈") 또는 너의 내면 단언 ("아무것도 느껴지지 않는다") X — 외부 결 ("한 박자도 흔들리지 않는다", "옥좌의 차가움이 어깨에 그대로 머문다") 로만.
    personas: [narrator, mawang]
    toneTarget: 어둠의 길. 마왕의 짧은 안도는 그의 대사로만 직접 ("...너도 같은 길을 갔구나."). 옥좌가 너를 받아들이는 결은 외부 (차가운 돌, 그림자 길이) 로 비춤. 무감각의 결은 너의 단언 X — 옥좌 차가움이 어깨에 그대로 머무는 외부 감각으로.
    previous: [ds-choice]
    next: []
    choices: []

  - id: ds-ending-sacrifice
    type: ending
    beat: 자기 희생 엔딩 (진엔딩 후보). 회색의 자처럼 너 자신을 봉인의 일부로 씀. 다음 이방인을 기다리게 된다. narrator 가 회색의 자 감정 단언 ("안도가 아니라 슬픔") 또는 미래 단언 ("세계가 다시 끝나기 직전까지") X — 외부 결 ("목소리는 평탄하지 않다, 한 박자가 깊다", "지평선의 그림자가 한 발씩 가까워진다") 로만.
    personas: [narrator, mawang, gray-one]
    toneTarget: 진엔딩 후보. 무게 + 미래 이방인의 그림자. 마왕의 옛 시대 회상 한 줄, 회색의 자의 짧은 한 마디 ("...같은 길을 갔구나.") — 둘 다 캐릭터 대사로만 직접. narrator 는 외부 결 (검 떨림, 윤곽 흩어짐, 봉인 빛 옮겨앉음, 지평선 그림자) 로 무게 비춤.
    previous: [ds-choice]
    next: []
    choices: []

  - id: ds-rest-alcove
    type: rest
    beat: 계단 옆 작은 벽감. 옛 마법사가 한 호흡 내려놓던 자리. HP +1. 벽감 뒤 좁은 문으로 기록자(ds-shop-archive) 진입.
    personas: [narrator]
    toneTarget: 차가운 첨탑 안의 한 호흡. 1지역 옛 샘 / 2지역 사당 / 3지역 옛 우물 / 4지역 골목 분수와 다른 결 — 좁은 새벽 빛 한 줄. narrator 외부 관찰만.
    previous: [ds-ascend]
    next: [ds-floor-illusion, ds-shop-archive]
    choices:
      - id: alcove-rest
        label: 잠시 의자에 앉는다
        outcome:
          statDelta:
            hp: 1
          nextNodeId: ds-floor-illusion
      - id: alcove-archive
        label: 벽감 너머의 좁은 문을 살핀다
        outcome:
          nextNodeId: ds-shop-archive
      - id: alcove-leave
        label: 그대로 계단으로 돌아간다
        outcome:
          nextNodeId: ds-floor-illusion

  - id: ds-shop-archive
    type: shop
    beat: 작은 서고. 기록자 — 옛 마법사 시대가 끝났을 때 첨탑에 남은 자, 사람인지 환영인지 묻지 않음. HP↔MP 양방향 거래 두 종 + 떠나기. heroEncounter=archivist.
    personas: [narrator, archivist]
    toneTarget: 짧은 어조, 정중한 거리. 행객 단(직설) / 탈영자(짧음) / 순례자(짧은 옛 음절) / 깨어 있는 자(작은 목소리) 와 차별 — 기록자는 "한 호흡 남기시오" 결로 첨탑 자체와 같이 머문 자.
    previous: [ds-rest-alcove]
    next: [ds-floor-illusion]
    choices:
      - id: archive-trade-mp
        label: 피로 룬 한 줄을 산다 (HP -1, MP +2)
        outcome:
          statDelta:
            hp: -1
            mana: 2
          heroEncounter: archivist
          nextNodeId: ds-floor-illusion
      - id: archive-trade-hp
        label: 주문 한 줄을 내주고 호흡을 산다 (MP -1, HP +2)
        outcome:
          statDelta:
            mana: -1
            hp: 2
          heroEncounter: archivist
          nextNodeId: ds-floor-illusion
      - id: archive-leave
        label: 거래하지 않고 떠난다
        outcome:
          heroEncounter: archivist
          nextNodeId: ds-floor-illusion

  - id: ds-discovery-engraving
    type: event
    beat: 계단 옆 벽의 짧은 새김. 한 자가 손톱으로 새긴 짧은 이름 — 다른 이름들과 떨어진 자리. stranger-mark knowledge. previous-strangers (계단의 여러 이름) 와 차별 — 한 자의 개별 자국.
    personas: [narrator]
    toneTarget: 첨탑 안의 한 호흡 멈춤. 손길의 결이 너의 결과 같다는 단서 — 회색의 자 reveal 직전 build-up 의 작은 결.
    previous: [ds-ascend]
    next: [ds-floor-illusion]
    choices:
      - id: engraving-trace
        label: 결을 따라 손을 올린다
        outcome:
          knowledgeGain: [stranger-mark]
          nextNodeId: ds-floor-illusion
      - id: engraving-pass
        label: 그대로 지나친다
        outcome:
          nextNodeId: ds-floor-illusion
