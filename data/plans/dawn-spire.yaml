region: dawn-spire
name: 새벽의 첨탑
description: |-
  옛 마법사들의 자리, 지금은 마왕의 옥좌. 이방인의 마지막 길.
  수상자의 정체가 드러나고, 3 엔딩 분기점이 있다.
entry: ds-arrive
boss: ds-mawang

nodes:
  - id: ds-arrive
    type: encounter
    beat: 첨탑 입구 도착. 차가운 새벽 빛. 4지역 도시 너머에서 솟아 있음. 이방인 혼자.
    personas: [narrator]
    toneTarget: 마지막 자리의 무게. 차가움 + 새벽 빛. 1~4지역의 결들이 다 모이는 자리.
    previous: []
    next: [ds-watcher]
    choices:
      - id: arrive-look
        label: 첨탑을 올려다본다
        outcome:
          knowledgeGain: [dawn-spire-glimpse]
          nextNodeId: ds-watcher
      - id: arrive-walk
        label: 그냥 들어간다
        outcome:
          nextNodeId: ds-watcher

  - id: ds-watcher
    type: event
    beat: 수상자 마지막 평소 등장 (reveal 직전). "...곧 알게 된다." 그가 너의 옆에 잠시 선다.
    personas: [narrator, sujangja]
    toneTarget: 수상자가 마지막으로 정체를 가린 채 등장. 무거움 — 그도 알고 있다, 다음에 reveal될 것.
    previous: [ds-arrive]
    next: [ds-ascend]
    echoes:
      - condition:
          knowledge: trusted-stranger
        text: |-
          수상자: "...너는 일찍부터 나를 따랐지. 곧 그 이유를 알게 된다."
      - condition:
          knowledge: rejected-stranger
        text: |-
          수상자: "...거절한 자에게도, 결국 같은 곳에서 만난다."
    choices:
      - id: watcher-listen
        label: 수상자의 말을 듣는다
        outcome:
          nextNodeId: ds-ascend
      - id: watcher-ascend
        label: 그를 두고 오른다
        outcome:
          nextNodeId: ds-ascend

  - id: ds-ascend
    type: encounter
    beat: 첨탑을 오르기 시작. 계단에 옛 이름들이 새겨져 있음 — 지나간 자들의 자국.
    personas: [narrator]
    toneTarget: 오름의 무게. 계단마다 옛 자들의 흔적. 이방인이 너 하나가 아니었음의 첫 단서.
    previous: [ds-watcher]
    next: [ds-floor-illusion]
    choices:
      - id: ascend-read
        label: 계단의 이름들을 읽는다
        outcome:
          knowledgeGain: [previous-strangers]
          nextNodeId: ds-floor-illusion
      - id: ascend-press
        label: 곧장 오른다
        outcome:
          nextNodeId: ds-floor-illusion

  - id: ds-floor-illusion
    type: event
    beat: 1층 — 마왕의 환각 발현. 옛 시대 첨탑 광경 (마법사들이 살던 시대) 잠시 보임. 4지역 환각 결 콜백.
    personas: [narrator, mawang]
    toneTarget: 환각의 결 — 옛 시대가 잠시 비침. 마왕이 너를 시험하는 결 (직접 등장 X, 환각만). 4지역 톤 회상.
    previous: [ds-ascend]
    next: [ds-floor-strangers]
    choices:
      - id: illusion-watch
        label: 환영을 본다
        outcome:
          statDelta:
            mana: -1
          knowledgeGain: [old-ages]
          nextNodeId: ds-floor-strangers
      - id: illusion-press
        label: 환영을 지나친다
        outcome:
          nextNodeId: ds-floor-strangers

  - id: ds-floor-strangers
    type: event
    beat: 2층 — 이전 이방인들의 흔적. 무덤 또는 기록. 자기 희생을 골랐던 자들의 결만 남음.
    personas: [narrator]
    toneTarget: 이방인의 정체 단서 — 너 하나가 아니었다. 무거움. 수상자 reveal 직전 build-up.
    previous: [ds-floor-illusion]
    next: [ds-floor-mages]
    echoes:
      - condition:
          knowledge: previous-strangers
        text: |-
          계단의 이름들이 여기서 다시 너에게 닿는다. 그들 중 하나가 너의 어깨에 손을 얹은 듯한 결.
    choices:
      - id: strangers-look
        label: 흔적을 자세히 본다
        outcome:
          knowledgeGain: [previous-strangers]
          nextNodeId: ds-floor-mages
      - id: strangers-press
        label: 곧장 다음 층으로
        outcome:
          nextNodeId: ds-floor-mages

  - id: ds-floor-mages
    type: event
    beat: 3층 — 옛 마법사들의 흔적. 베일런 노사가 떠난 이유 — 그의 옛 동료들 모두 마왕에 잠식됨.
    personas: [narrator]
    toneTarget: 베일런의 옛 동료들의 결 — 그가 첨탑을 떠난 이유. 마왕의 정신 조작이 첨탑까지 닿았다.
    previous: [ds-floor-strangers]
    next: [ds-throne]
    echoes:
      - condition:
          knowledge: bayren-respect
        text: |-
          베일런 노사가 너에게 룬을 가르쳤을 때의 결이 떠오른다. 그의 한숨이 이 자리에서 무엇을 떠올린 것이었는지 너는 이제 안다.
    choices:
      - id: mages-witness
        label: 옛 동료들의 흔적을 본다
        outcome:
          knowledgeGain: [bayren-tower-secret]
          nextNodeId: ds-throne
      - id: mages-pass
        label: 그저 지나친다
        outcome:
          nextNodeId: ds-throne

  - id: ds-throne
    type: event
    beat: 옥좌실 입구. 수상자가 옆에 서 있음. 그가 자기 정체를 말한다 — "나는 너 이전의 자다."
    personas: [narrator, sujangja]
    toneTarget: 수상자 reveal의 정점. 무거움 + 안도 + 슬픔. 그가 너에게 봉인 가능성 (희생 엔딩) 흘리지만 추천 X.
    previous: [ds-floor-mages]
    next: [ds-mawang]
    choices:
      - id: throne-listen
        label: 그의 말을 듣는다
        outcome:
          knowledgeGain: [watcher-revealed]
          nextNodeId: ds-mawang
      - id: throne-question
        label: 그에게 묻는다
        outcome:
          knowledgeGain: [watcher-revealed]
          nextNodeId: ds-mawang

  - id: ds-mawang
    type: boss
    beat: 마왕 첫 등장. 옥좌에서 일어남. "또 왔구나." 정중함 + 차가움. 적개심 X — 인식.
    personas: [narrator, mawang]
    toneTarget: 마왕의 첫 등장. 사령관(슬픔), 잠식된 자(무감), 잠든 왕(모름)과 다른 결 — **인식 + 비극적 깊이**. 그도 한때 이방인이었음의 결.
    previous: [ds-throne]
    next: [ds-choice]
    echoes:
      - condition:
          knowledge: warrior-awakened
        text: |-
          마왕: "...칼은 약하다. 그러나 너는 그것을 알면서도 들었군."
      - condition:
          knowledge: mage-awakened
        text: |-
          마왕: "...룬을 외운 자가 또 왔다. 베일런 그가 너에게 가르쳤는가."
      - condition:
          knowledge: chose-wake
        text: |-
          마왕: "...도시를 깨운 자로구나. 시민들의 비명이 너의 등 뒤에서 따라왔겠지."
    choices:
      - id: mawang-meet
        label: 그를 마주본다
        outcome:
          heroEncounter: mawang
          knowledgeGain: [mawang-glimpse]
          nextNodeId: ds-choice
      - id: mawang-pause
        label: 잠시 멈춘다
        outcome:
          heroEncounter: mawang
          knowledgeGain: [mawang-glimpse]
          nextNodeId: ds-choice

  - id: ds-choice
    type: event
    beat: 3 엔딩 분기점. 마왕 처치 / 배신 (마왕 합류) / 자기 희생 (수상자처럼 봉인). 마왕은 너를 막지 않는다.
    personas: [narrator, mawang, sujangja]
    toneTarget: 가장 무거운 자리. 셋 중 어느 것도 가볍지 않음. 마왕은 결과를 안다 ("끝은 어차피 같다 — 형태만 다르다"). 수상자는 침묵.
    previous: [ds-mawang]
    next: [ds-ending-defeat, ds-ending-betrayal, ds-ending-sacrifice]
    choices:
      - id: choice-defeat
        label: 마왕을 처치한다
        outcome:
          knowledgeGain: [chose-defeat]
          nextNodeId: ds-ending-defeat
      - id: choice-betray
        label: 마왕에 합류한다
        outcome:
          knowledgeGain: [chose-betrayal]
          nextNodeId: ds-ending-betrayal
      - id: choice-sacrifice
        label: 자기 자신을 봉인한다
        outcome:
          knowledgeGain: [chose-sacrifice]
          nextNodeId: ds-ending-sacrifice

  - id: ds-ending-defeat
    type: ending
    beat: 마왕 처치 엔딩. 영웅적 승리 — but 비극적. 다음 이방인이 또 올 것 (세계는 끝나지 않음).
    personas: [narrator, mawang]
    toneTarget: 영웅적이지만 비극적. 마왕의 마지막 한 마디 ("...너도 자기 자리에 서게 된다."). 수상자 침묵 (그도 같은 자리에 섰던 자).
    previous: [ds-choice]
    next: []
    choices: []

  - id: ds-ending-betrayal
    type: ending
    beat: 배신 엔딩. 마왕에 합류 — 너는 다음 마왕이 된다. 어둠의 길 / Renegade 결.
    personas: [narrator, mawang]
    toneTarget: 어둠의 길. 마왕의 짧은 안도 ("...너도 같은 길을 갔구나."). 옥좌가 너를 받아들임. 무감각.
    previous: [ds-choice]
    next: []
    choices: []

  - id: ds-ending-sacrifice
    type: ending
    beat: 자기 희생 엔딩 (진엔딩 후보). 수상자처럼 너 자신을 봉인의 일부로 씀. 다음 이방인을 기다리게 된다.
    personas: [narrator, mawang, sujangja]
    toneTarget: 진엔딩 후보. 무게 + 안도 + 미래 이방인의 그림자. 마왕의 옛 시대 회상 한 줄. 수상자가 너에게 자리를 넘김.
    previous: [ds-choice]
    next: []
    choices: []
