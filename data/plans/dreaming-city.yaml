region: dreaming-city
name: 꿈꾸는 도시
description: |-
  마왕의 환각 마법이 도시 전체를 환영 속 평화에 가둔 곳. 잠든 왕의
  꿈이 도시의 환영을 유지하고 있다. 마왕 정신 조작 능력의 정점.
entry: dc-arrive
boss: dc-king

nodes:
  - id: dc-arrive
    type: encounter
    beat: 도시 입구. 기괴할 정도로 평화로운 첫 인상. 시민들의 미소가 너무 많고, 발걸음이 너무 가볍다. 이방인 혼자.
    personas: [narrator]
    toneTarget: 환영의 첫 인상 — "이상하게 평화롭다"는 결. 차가운 의심이 깔려 있음. 시민들은 사람 형태이지만 결이 어긋남.
    previous: []
    next: [dc-watcher]
    choices:
      - id: arrive-look
        label: 시민들을 살펴본다
        outcome:
          knowledgeGain: [dreaming-city-glimpse]
          nextNodeId: dc-watcher
      - id: arrive-walk
        label: 그냥 걸어 들어간다
        outcome:
          nextNodeId: dc-watcher

  - id: dc-watcher
    type: event
    beat: 회색의 자 등장. 환영 안에서도 그는 변함없음. "이 도시 전체가 한 사람의 꿈이다." 잠든 왕 단서 흘림.
    personas: [narrator, gray-one]
    toneTarget: 회색의 자의 단서가 무거움. 도시가 환영이라는 것을 처음 명시. 잠든 왕 존재 단서.
    previous: [dc-arrive]
    next: [dc-citizen]
    echoes:
      - condition:
          knowledge: trusted-stranger
        text: |-
          회색의 자: "여기까지 왔구나. 너의 길이 너에게 닿아 있다."
      - condition:
          knowledge: fled-corrupted
        text: |-
          회색의 자: "황무지에서 등을 돌린 자도, 여기선 깨어 있어야 한다."
      - condition:
          knowledge: templar-creed
        text: |-
          회색의 자가 너의 손을 잠깐 본다.

          회색의 자: "옛 신앙의 결이 이 도시에선 가벼워진다. 잊지 마라."
    choices:
      - id: watcher-listen
        label: 회색의 자의 말을 듣는다
        outcome:
          knowledgeGain: [city-illusion]
          nextNodeId: dc-citizen
      - id: watcher-silent
        label: 묻지 않는다
        outcome:
          nextNodeId: dc-citizen

  - id: dc-citizen
    type: encounter
    beat: 시민과 첫 조우. 친절한 인사 — but 결이 어긋남. 같은 인사를 반복함, 같은 미소. 환영 안의 사람.
    personas: [narrator]
    toneTarget: 친절함의 결이 잘못된 결. 시민은 따뜻하지만 너의 안쪽에 닿지 않음. 환영의 첫 명확한 증거.
    previous: [dc-watcher]
    next: [dc-fork]
    choices:
      - id: citizen-respond
        label: 인사를 받아준다
        outcome:
          nextNodeId: dc-fork
      - id: citizen-ask
        label: 그에게 진실을 묻는다
        outcome:
          knowledgeGain: [city-illusion]
          nextNodeId: dc-fork

  - id: dc-fork
    type: encounter
    beat: 갈림길. 시장(번화한 환영의 중심) vs 옛 거리(균열 있는 곳, 진실 가까이). 가지 진입 (분수 골목 / 옛 명패 결) 두 개 추가 — gate 없음. 이방인 혼자.
    personas: [narrator]
    toneTarget: 두 길의 무게 — 환영의 화려함 vs 진실의 균열. 둘 다 왕궁으로 이어짐. 가지 분기는 무게보다 호흡 — 환영 가장자리로 잠깐 비껴남.
    previous: [dc-citizen]
    next: [dc-market, dc-old, dc-rest-fountain, dc-discovery-name]
    choices:
      - id: fork-market
        label: 시장 쪽으로 간다
        outcome:
          nextNodeId: dc-market
      - id: fork-old
        label: 옛 거리 쪽으로 간다
        outcome:
          nextNodeId: dc-old
      - id: fork-fountain
        label: 골목 안쪽 분수의 결을 따라간다
        outcome:
          nextNodeId: dc-rest-fountain
      - id: fork-side-name
        label: 옛 명패의 결을 살핀다
        outcome:
          nextNodeId: dc-discovery-name

  - id: dc-market
    type: encounter
    beat: 환영의 중심. 시장은 너무 화려함. 모두가 같은 방향으로 미소. 색이 너무 많음.
    personas: [narrator]
    toneTarget: 환영의 정점 — 화려함이 무거움. 색의 과잉, 미소의 과잉. 정상 같지 않은 평화.
    previous: [dc-fork]
    next: [dc-vendor]
    choices:
      - id: market-blend
        label: 군중에 섞인다
        outcome:
          statDelta:
            mana: -1
          nextNodeId: dc-vendor
      - id: market-press
        label: 곧장 가로지른다
        outcome:
          nextNodeId: dc-vendor

  - id: dc-vendor
    type: event
    beat: 시장 상인 한 명 — 너에게 무언가를 팔려 함. 환영의 일부지만 의식 파편이 잠깐 올라옴 ("...너는 새로운 자다").
    personas: [narrator]
    toneTarget: 환영 안의 의식 파편. 시민이 잠시 깨려는 결. 그러나 다시 환영으로 돌아감.
    previous: [dc-market]
    next: [dc-converge]
    choices:
      - id: vendor-listen
        label: 상인의 말을 듣는다
        outcome:
          knowledgeGain: [broken-illusion]
          nextNodeId: dc-converge
      - id: vendor-leave
        label: 그냥 떠난다
        outcome:
          nextNodeId: dc-converge

  - id: dc-old
    type: encounter
    beat: 옛 거리. 환영이 잘 닿지 않는 곳. 건물에 균열이 보임 — 그 너머로 폐허가 한 박자 비침. 이방인 혼자.
    personas: [narrator]
    toneTarget: 환영의 가장자리. 균열을 통해 진실이 새어 나옴. 차가움 + 무게.
    previous: [dc-fork]
    next: [dc-crack]
    choices:
      - id: old-look
        label: 균열을 자세히 본다
        outcome:
          knowledgeGain: [broken-illusion]
          nextNodeId: dc-crack
      - id: old-walk
        label: 그냥 지나친다
        outcome:
          nextNodeId: dc-crack

  - id: dc-crack
    type: event
    beat: 옛 거리 끝, 환영이 거의 사라진 곳. 폐허가 명확히 보임. 시민들이 환영 안에서 잠들어 있는 진짜 모습 한 번 비침.
    personas: [narrator]
    toneTarget: 진실의 잠깐의 발현 — 폐허 + 잠든 시민들. 이방인은 잠시 도시의 진실을 봄. 무거움.
    previous: [dc-old]
    next: [dc-converge]
    choices:
      - id: crack-witness
        label: 잠시 멈춰 진실을 본다
        outcome:
          statDelta:
            mana: -1
          knowledgeGain: [city-illusion]
          nextNodeId: dc-converge
      - id: crack-rush
        label: 곧장 전진한다
        outcome:
          nextNodeId: dc-converge

  - id: dc-converge
    type: encounter
    beat: 두 길이 만남. 왕궁 입구. 환영이 가장 짙음 (왕의 꿈에 가까움). 이방인 혼자.
    personas: [narrator]
    toneTarget: 보스 직전. 왕궁 자체가 환영의 중심. 공기가 잠긴 결.
    previous: [dc-vendor, dc-crack]
    next: [dc-throne]
    choices:
      - id: conv-press
        label: 곧장 들어간다
        outcome:
          nextNodeId: dc-throne
      - id: conv-pause
        label: 잠시 숨을 고른다
        outcome:
          nextNodeId: dc-throne

  - id: dc-throne
    type: event
    beat: 왕궁 옥좌실. 잠든 왕 처음 발현 — 옥좌에 앉아 있음, 눈은 감겨 있음. 도시의 꿈이 그에게서 흘러 나옴.
    personas: [narrator, sleeping-king]
    toneTarget: 옥좌실의 정적. 잠든 왕의 첫 등장 — 자기가 잠든 줄 모름. 의식 파편이 가끔 올라와 한 마디.
    previous: [dc-converge]
    next: [dc-king]
    choices:
      - id: throne-approach
        label: 옥좌에 다가간다
        outcome:
          heroEncounter: sleeping-king
          knowledgeGain: [sleeping-king-glimpse]
          nextNodeId: dc-king
      - id: throne-listen
        label: 그의 말을 들어본다
        outcome:
          heroEncounter: sleeping-king
          knowledgeGain: [sleeping-king-glimpse, ethical-weight]
          nextNodeId: dc-king

  - id: dc-king
    type: boss
    beat: 잠든 왕 본체. 깨울지, 끝낼지, 떠날지 윤리적 분기. 클래스별 다른 결. narrator 가 그의 본질("적이 아님") / 도덕("어느 길도 가볍지 않음") / 너의 내면("상처가 안쪽에 남음") 직접 단언 X — 외부 동작(손이 팔걸이에 놓임, 발이 한 박자 멈춤, 칼이 손에서 떨어지지 않음) 으로만.
    personas: [narrator, sleeping-king]
    toneTarget: 보스전 정점이지만 전투 X — **윤리적 무게**. 깨우면 도시 무너짐, 안 깨우면 환영 영구. 어느 쪽이 옳은가. 잠든 왕 톤은 페르소나 가이드 따름 — narrator 는 그의 모름/꿈을 단언하지 않고 외부 결로 비춤.
    previous: [dc-throne]
    next: [dc-resolution]
    choices:
      - id: king-warrior
        label: 검으로 끝낸다
        condition:
          class: warrior
        outcome:
          statDelta:
            hp: -2
          knowledgeGain: [ethical-weight, chose-end]
          nextNodeId: dc-resolution
      - id: king-mage
        label: 룬으로 그를 깨운다
        condition:
          class: mage
        outcome:
          statDelta:
            mana: -2
          knowledgeGain: [ethical-weight, chose-wake]
          nextNodeId: dc-resolution
      - id: king-leave
        label: 떠난다 (환영 그대로)
        outcome:
          knowledgeGain: [ethical-weight, chose-leave]
          nextNodeId: dc-resolution

  - id: dc-resolution
    type: ending
    beat: 4지역 끝. 잠든 왕의 운명 결정 후 도시의 결판. 회색의 자 등장 — 5지역 (새벽의 첨탑) 암시. 마왕 본체와 마주칠 곳.
    personas: [narrator, sleeping-king, gray-one]
    toneTarget: 결판 정서 — 윤리적 무게의 잔향. 잠든 왕의 마지막 한 마디 (선택에 따라 다름). 회색의 자의 짧은 한 줄 — 첨탑 암시. 마지막 단락은 개발용 메타 마커.
    previous: [dc-king]
    next: []
    echoes:
      - condition:
          knowledge: chose-end
        text: |-
          도시는 무너졌다. 너의 칼끝에서 시작한 무너짐이 광장 너머까지 닿는다. 시민들의 미소는 다시는 같은 각도로 걸리지 않을 것이다.
      - condition:
          knowledge: chose-wake
        text: |-
          도시는 깨어났다. 비명과 폐허가 함께 일어선다. 시민들은 이제 자신이 무엇을 잃었는지 안다 — 너 때문에.
      - condition:
          knowledge: chose-leave
        text: |-
          도시는 그대로 잠들어 있다. 시민들은 영원한 평화 안에 있다. 너만 그 평화 바깥에 서 있다.
      - condition:
          knowledge: bayren-respect
        text: |-
          베일런의 룬이 이 도시에선 다른 무게로 닿았다. 그가 보았으면 무엇이라 했을까. 네가 모를 것이다.
    choices: []

  - id: dc-rest-fountain
    type: rest
    beat: 골목 안쪽 옛 분수. 환영 색이 한 겹 옅어진 자리. HP +1. 분수 너머 좁은 문으로 깨어 있는 자(dc-shop-keeper) 진입.
    personas: [narrator]
    toneTarget: 환영의 가장자리 — 평화의 색이 옅어지는 곳. 차고 깨끗한 물. 광장 소리가 등 뒤에서 한 박자 늦게 도착하는 결.
    previous: [dc-fork]
    next: [dc-fork, dc-shop-keeper]
    choices:
      - id: fountain-drink
        label: 분수의 물을 마신다
        outcome:
          statDelta:
            hp: 1
          nextNodeId: dc-fork
      - id: fountain-shop
        label: 골목 안쪽 작은 가게를 살핀다
        outcome:
          nextNodeId: dc-shop-keeper
      - id: fountain-leave
        label: 그대로 길로 돌아간다
        outcome:
          nextNodeId: dc-fork

  - id: dc-shop-keeper
    type: shop
    beat: 환영 가장자리의 작은 가게. 깨어 있는 자 — 광장 시민과 다른 결. HP↔MP 양방향 거래 두 종 + 떠나기. heroEncounter=awake-one. dc-vendor(환영 안 의식 파편) 와 차별 — 이쪽은 환영 바깥의 자.
    personas: [narrator, awake-one]
    toneTarget: 작은 목소리, 짧은 어조. dc-vendor(환영 안 의식 파편이 잠깐 올라옴) 와 결정적으로 다른 결 — 깨어 있는 자는 도시가 잠든 줄 안다. "...깨어 있으시오." 결.
    previous: [dc-rest-fountain]
    next: [dc-fork]
    choices:
      - id: keeper-trade-mp
        label: 피로 한 호흡을 산다 (HP -1, MP +2)
        outcome:
          statDelta:
            hp: -1
            mana: 2
          heroEncounter: awake-one
          nextNodeId: dc-fork
      - id: keeper-trade-hp
        label: 주문 한 줄을 내주고 호흡을 산다 (MP -1, HP +2)
        outcome:
          statDelta:
            mana: -1
            hp: 2
          heroEncounter: awake-one
          nextNodeId: dc-fork
      - id: keeper-leave
        label: 거래하지 않고 떠난다
        outcome:
          heroEncounter: awake-one
          nextNodeId: dc-fork

  - id: dc-discovery-name
    type: event
    beat: 옛 거리 균열의 작은 명패. 시민들이 잠들기 전 누군가가 새긴 이름의 결. buried-name knowledge. 잠식된 자의 잊은 이름 / 잠든 시민의 잊혀진 이름 대비.
    personas: [narrator]
    toneTarget: 환영이 닿지 않는 좁은 자리. 글자는 닳았지만 결은 또렷한 호흡. 광장의 미소가 등 뒤에서 한 박자 늦게 멎는 결.
    previous: [dc-fork]
    next: [dc-fork]
    choices:
      - id: name-trace
        label: 결을 따라 손을 올린다
        outcome:
          knowledgeGain: [buried-name]
          nextNodeId: dc-fork
      - id: name-pass
        label: 그대로 지나친다
        outcome:
          nextNodeId: dc-fork
