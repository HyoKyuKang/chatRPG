region: forest-outskirts
name: 숲의 외곽
description: |-
  이방인이 처음 발 디딘 곳. 안개와 오래된 나무들. 깊은 곳에서 무언가가 썩고 있다.
entry: fo-arrive
boss: fo-boss-tree

nodes:
  - id: fo-arrive
    type: encounter
    beat: 게임 시작 — 이방인이 안개 속에서 깨어남. 몸은 자기 것이 맞지만 이 땅은 자기 것이 아님.
    personas: [narrator]
    toneTarget: 정체 모를 곳에 떨어진 직후의 첫 감각. 미스터리 + 차분한 두려움. 말 수 적음. 비유 한 번만.
    previous: []
    next: [fo-stranger]
    choices:
      - id: arrive-look
        label: 주위를 둘러본다
        outcome:
          knowledgeGain: [glimpse-of-mist]
          nextNodeId: fo-stranger
      - id: arrive-stand
        label: 그냥 일어선다
        outcome:
          nextNodeId: fo-stranger

  - id: fo-stranger
    type: event
    beat: 첫 캐릭터 등장 — 수상자가 안개 사이에서 모습 드러내고 첫 대사 ("드디어 왔구나").
    personas: [narrator, sujangja]
    toneTarget: 정체 모를 동맹의 첫 등장. 미스터리 + 약간의 권위. 환영보다는 인정. 수상자는 자기 정체 안 흘리고 옆으로 비킨다.
    previous: [fo-arrive]
    next: [fo-fork]
    choices:
      - id: str-who
        label: 당신은 누구인가
        outcome:
          nextNodeId: fo-fork
      - id: str-trust
        label: 당신을 믿겠다
        outcome:
          knowledgeGain: [trusted-stranger]
          nextNodeId: fo-fork
      - id: str-reject
        label: 관심 없다
        outcome:
          knowledgeGain: [rejected-stranger]
          nextNodeId: fo-fork

  - id: fo-fork
    type: encounter
    beat: 죽은 나무 앞에서 검 vs 양피지 갈림길. 클래스 트랙 분기. 수상자 멀리서 한 줄.
    personas: [narrator, sujangja]
    toneTarget: 침묵의 선택. 두 가지 무게가 너 앞에 놓였다. 갈림 자체가 메인 무게. 수상자 목소리는 가깝지 않음.
    previous: [fo-stranger]
    next: [fo-astrid-meet, fo-bayren-meet]
    choices:
      - id: fork-sword
        label: 녹슨 검을 잡는다
        outcome:
          itemAdd: [rusted-sword]
          nextNodeId: fo-astrid-meet
      - id: fork-scroll
        label: 낡은 양피지를 펼친다
        condition:
          knowledge: glimpse-of-mist
        outcome:
          itemAdd: [old-scroll]
          knowledgeGain: [mist-meaning]
          nextNodeId: fo-bayren-meet

  - id: fo-astrid-meet
    type: encounter
    beat: 아스트리드 첫 등장 — 어리고 곧음. 둘 다 같은 방향으로 가야 할 듯.
    personas: [narrator, astrid]
    toneTarget: 첫 외로움 들킴. 아스트리드 경계 + 안도 동시. 어리고 진지함이 곧 나옴. 너에 대한 즉각적 동지 의식.
    previous: [fo-fork]
    next: [fo-astrid-fight]
    choices:
      - id: astrid-join
        label: 함께 가겠다
        outcome:
          heroEncounter: astrid
          nextNodeId: fo-astrid-fight
      - id: astrid-follow
        label: 잠시 보고 따라간다
        outcome:
          heroEncounter: astrid
          nextNodeId: fo-astrid-fight

  - id: fo-astrid-fight
    type: combat
    beat: 부패한 늑대와 첫 전투. 아스트리드 옆에서 외운 신앙 문구 들림.
    personas: [narrator, astrid]
    toneTarget: 첫 전투. 즉물적. 신체 감각 강함. 부패의 색/냄새 비침.
    previous: [fo-astrid-meet]
    next: [fo-warrior-awaken]
    choices:
      - id: fight-swing
        label: 검을 휘두른다
        condition:
          item: rusted-sword
        outcome:
          statDelta:
            hp: -1
          knowledgeGain: [templar-creed]
          nextNodeId: fo-warrior-awaken
      - id: fight-cover
        label: 그녀 뒤에 선다
        outcome:
          nextNodeId: fo-warrior-awaken

  - id: fo-warrior-awaken
    type: event
    beat: 전투 후 정적. 아스트리드의 의심 한 줄 + 너의 손이 검을 알고 있는 인식. 클래스 정체성 확정 직전.
    personas: [narrator, astrid]
    toneTarget: 첫 클래스 각성. 정체성 확정 비트. 정적 + 무게.
    previous: [fo-astrid-fight]
    next: [fo-converge]
    choices:
      - id: awaken-warrior
        label: 검을 든 자로 살겠다
        outcome:
          classSet: warrior
          knowledgeGain: [warrior-awakened]
          nextNodeId: fo-converge

  - id: fo-bayren-meet
    type: encounter
    beat: 베일런 노사 첫 등장 — 부서진 마차 옆 모닥불, 까칠. 양피지 보면 눈썹 한 번.
    personas: [narrator, bayren-rosa]
    toneTarget: 까칠 + 직업적 관심. 도와주는 게 아니라 시험하는 결.
    previous: [fo-fork]
    next: [fo-bayren-rune]
    choices:
      - id: bayren-ask
        label: 이게 무슨 글인지 알려달라
        outcome:
          heroEncounter: bayren-rosa
          nextNodeId: fo-bayren-rune
      - id: bayren-greet
        label: 그저 인사만 한다
        outcome:
          heroEncounter: bayren-rosa
          nextNodeId: fo-bayren-rune

  - id: fo-bayren-rune
    type: event
    beat: 노인이 흙바닥에 세 줄 룬 그림. "한 번. 딱 한 번 외워봐." 시험.
    personas: [narrator, bayren-rosa]
    toneTarget: 시험 통과의 정적. 단어가 너의 입에서 너의 것 아닌 결로 나옴. mana 소진 = 정신력 즉물성.
    previous: [fo-bayren-meet]
    next: [fo-mage-awaken]
    choices:
      - id: rune-recite
        label: 긴 호흡을 하고 외운다
        outcome:
          statDelta:
            mana: -1
          knowledgeGain: [rune-fundamentals]
          nextNodeId: fo-mage-awaken
      - id: rune-falter
        label: 주저하다 외운다
        outcome:
          statDelta:
            mana: -1
          nextNodeId: fo-mage-awaken

  - id: fo-mage-awaken
    type: event
    beat: 노인 인정 + 부탁. 클래스 정체성 확정 + 다음 목적 부여.
    personas: [narrator, bayren-rosa]
    toneTarget: 첫 클래스 각성. 노인 인정은 짧음, 부탁이 더 무게 있음. 다음 지역 어두운 쪽 암시.
    previous: [fo-bayren-rune]
    next: [fo-converge]
    choices:
      - id: awaken-mage
        label: 룬을 부르는 자로 살겠다
        outcome:
          classSet: mage
          knowledgeGain: [mage-awakened]
          nextNodeId: fo-converge

  - id: fo-converge
    type: encounter
    beat: 합류 + 위협 고조. 이방인 혼자 (아스트리드/베일런 노사 모두 각성 후 떠남). 풀이 검게 변함. 새소리 사라짐. 단 냄새.
    personas: [narrator]
    toneTarget: 위협 고조. 침묵의 변화. 풍경의 색/소리/냄새가 점점 어두워짐. narrator 차분함이 더 무거움.
    previous: [fo-warrior-awaken, fo-mage-awaken]
    next: [fo-boss-tree]
    choices:
      - id: conv-march
        label: 곧장 전진한다
        outcome:
          nextNodeId: fo-boss-tree
      - id: conv-watch
        label: 주변을 살피며 간다
        outcome:
          knowledgeGain: [corruption-witnessed]
          nextNodeId: fo-boss-tree

  - id: fo-boss-tree
    type: boss
    beat: 부패한 거대 나무 — 의인화된 식물. 이방인 혼자 (동반자 없음). 너의 이름이 아닌 무언가를 부른다 (외신 결).
    personas: [narrator]
    toneTarget: 보스 도착. 위협 정점. 외신 결 핵심. 클래스별 출력 차별화. 도망은 잔향이 길다.
    previous: [fo-converge]
    next: [fo-resolution]
    choices:
      - id: boss-sword
        label: 검으로 뿌리를 베어낸다
        condition:
          class: warrior
          item: rusted-sword
        outcome:
          statDelta:
            hp: -2
          nextNodeId: fo-resolution
      - id: boss-rune
        label: 룬을 던진다
        condition:
          class: mage
          item: old-scroll
        outcome:
          statDelta:
            mana: -2
          itemRemove: [old-scroll]
          nextNodeId: fo-resolution
      - id: boss-flee
        label: 도망친다
        outcome:
          nextNodeId: fo-resolution

  - id: fo-resolution
    type: ending
    beat: 1지역 끝. 어떤 결로 왔든 살아 돌아왔다는 결판. 수상자 마지막 한 줄. 산맥 (2지역) 암시.
    personas: [narrator, sujangja]
    toneTarget: 결판 정서. 살아 돌아온 자의 안도 (또는 어둠). 거대 나무 운명 모호 — "안개 너머의 일". 마지막 단락은 개발용 메타 마커.
    previous: [fo-boss-tree]
    next: []
    choices: []
