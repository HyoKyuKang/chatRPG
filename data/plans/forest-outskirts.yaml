region: forest-outskirts
name: 숲의 외곽
description: |-
  이방인이 처음 발 디딘 곳. 안개와 오래된 나무들. 깊은 곳에서 무언가가 썩고 있다.
entry: fo-arrive
boss: fo-boss-tree

nodes:
  - id: fo-arrive
    type: encounter
    beat: 게임 시작 — 이방인이 안개 속에서 깨어남. 몸은 자기 것이 맞지만 이 땅은 자기 것이 아님.
    personas: [narrator]
    toneTarget: 정체 모를 곳에 떨어진 직후의 첫 감각. 미스터리 + 차분한 두려움. 말 수 적음. 비유 한 번만.
    previous: []
    next: [fo-stranger]
    choices:
      - id: arrive-look
        label: 안개 너머를 살핀다
        outcome:
          knowledgeGain: [glimpse-of-mist]
          nextNodeId: fo-stranger
      - id: arrive-stand
        label: 몸을 일으킨다
        outcome:
          nextNodeId: fo-stranger

  - id: fo-stranger
    type: event
    beat: 첫 캐릭터 등장 — 회색의 자가 안개 사이에서 모습 드러내고 첫 대사 ("드디어 왔구나"). 여기서 게임의 기본 약속을 짧게 명시한다. 너는 이 순환의 이방인이고, 새벽의 첨탑까지 가야 하며, 마왕의 손이 이미 숲까지 닿았다.
    personas: [narrator, gray-one]
    toneTarget: 정체 모를 동맹의 첫 등장. 미스터리 + 약간의 권위. 환영보다는 인정. 회색의 자는 자기 정체를 숨기되, 플레이어의 목표와 위험은 숨기지 않는다. 설명은 길게 풀지 말고 3~4줄의 대사로 stakes를 박는다.
    previous: [fo-arrive]
    next: [fo-fork]
    choices:
      - id: str-who
        label: 여긴 어디지. 넌 누구야?
        outcome:
          nextNodeId: fo-fork
      - id: str-trust
        label: 새벽의 첨탑... 거기로 가면 되나?
        outcome:
          knowledgeGain: [trusted-stranger]
          nextNodeId: fo-fork
      - id: str-reject
        label: 잠깐. 난 아직 아무것도 몰라
        outcome:
          knowledgeGain: [rejected-stranger]
          nextNodeId: fo-fork

  - id: fo-fork
    type: encounter
    beat: 죽은 나무 앞에서 검 vs 양피지 갈림길. 클래스 트랙 분기. 샘/상점/유물 샛길도 열어 첫 지역 탐험의 숨통을 만든다. 회색의 자 멀리서 한 줄.
    personas: [narrator, gray-one]
    toneTarget: 침묵의 선택. 두 가지 무게가 너 앞에 놓였다. 갈림 자체가 메인 무게. 회색의 자 목소리는 가깝지 않음.
    previous: [fo-stranger]
    next: [fo-astrid-meet, fo-bayren-meet, fo-rest-spring, fo-discovery-relic]
    choices:
      - id: fork-sword
        label: 녹슨 검 쪽으로 손을 뻗는다
        outcome:
          itemAdd: [rusted-sword]
          nextNodeId: fo-astrid-meet
      - id: fork-scroll
        label: 낡은 양피지를 조심스레 펼친다
        outcome:
          itemAdd: [old-scroll]
          knowledgeGain: [mist-meaning]
          nextNodeId: fo-bayren-meet
      - id: fork-spring
        label: 물소리 나는 쪽으로 가본다
        outcome:
          nextNodeId: fo-rest-spring
      - id: fork-side-path
        label: 발자국 없는 샛길을 본다
        outcome:
          nextNodeId: fo-discovery-relic

  - id: fo-rest-spring
    type: rest
    beat: 옛 샘. HP를 조금 회복하거나 행객 단의 천막으로 이어지는 첫 안전 지대. 안개를 살핀 플레이어에게 짧은 echo.
    personas: [narrator]
    toneTarget: 숨 돌림. 안전하지만 완전히 따뜻하지는 않음. 물, 이름 자국, 지워지는 반영.
    previous: [fo-fork]
    next: [fo-fork, fo-shop-traveler]
    choices:
      - id: rest-drink
        label: 두 손으로 물을 마신다
        outcome:
          statDelta:
            hp: 1
          nextNodeId: fo-fork
      - id: rest-tent
        label: 천막 쪽으로 다가간다
        outcome:
          nextNodeId: fo-shop-traveler
      - id: rest-leave
        label: 길로 돌아간다
        outcome:
          nextNodeId: fo-fork

  - id: fo-shop-traveler
    type: shop
    beat: 행객 단 첫 등장. HP를 마나로 바꾸거나, 마나를 써서 보스 중 회복 가능한 마른 약초를 얻는다.
    personas: [narrator, wanderer-dan]
    toneTarget: 짧고 단정한 거래. 친절보다 정확함. 천막은 너무 준비된 듯한 느낌.
    previous: [fo-rest-spring]
    next: [fo-fork]
    choices:
      - id: shop-trade-mp
        label: 한 모금 마신다
        condition:
          statGte:
            name: hp
            value: 2
        outcome:
          statDelta:
            hp: -1
            mana: 2
          heroEncounter: wanderer-dan
          nextNodeId: fo-fork
      - id: shop-buy-herb
        label: 약초가 있나
        condition:
          statGte:
            name: mana
            value: 1
        outcome:
          statDelta:
            mana: -1
          itemAdd: [dried-herb]
          heroEncounter: wanderer-dan
          nextNodeId: fo-fork
      - id: shop-leave
        label: 천막을 나온다
        outcome:
          heroEncounter: wanderer-dan
          nextNodeId: fo-fork

  - id: fo-discovery-relic
    type: event
    beat: 샛길 끝의 빈 돌상자. 즉시 전투력을 주지는 않지만 결말/합류에서 숲이 이전 이방인을 기다린 흔적처럼 echo된다.
    personas: [narrator]
    toneTarget: 작고 조용한 발견. 보상보다 빈자리의 감각. 손끝 기억.
    previous: [fo-fork]
    next: [fo-fork]
    choices:
      - id: relic-open
        label: 돌상자의 뚜껑을 민다
        outcome:
          knowledgeGain: [forgotten-relic]
          nextNodeId: fo-fork
      - id: relic-bury
        label: 흙을 다시 덮는다
        outcome:
          nextNodeId: fo-fork

  - id: fo-astrid-meet
    type: encounter
    beat: 아스트리드 첫 등장 — 어리고 곧음. 둘 다 같은 방향으로 가야 할 듯.
    personas: [narrator, astrid]
    toneTarget: 첫 외로움 들킴. 아스트리드 경계 + 안도 동시. 어리고 진지함이 곧 나옴. 너에 대한 즉각적 동지 의식.
    previous: [fo-fork]
    next: [fo-astrid-fight]
    choices:
      - id: astrid-join
        label: 혼자보단 낫겠지
        outcome:
          heroEncounter: astrid
          nextNodeId: fo-astrid-fight
      - id: astrid-follow
        label: 말없이 그녀의 뒤를 따른다
        outcome:
          heroEncounter: astrid
          nextNodeId: fo-astrid-fight

  - id: fo-astrid-fight
    type: combat
    enemyId: rotting-wolf
    beat: 부패한 늑대와 첫 전투. 아스트리드 옆에서 외운 신앙 문구 들림. rotting-wolf hp 5 — 정면 공격은 2턴, 물러서기는 3턴 정도로 전투 예고/턴 UI를 학습시킨다.
    personas: [narrator, astrid]
    toneTarget: 첫 전투. 즉물적. 신체 감각 강함. 부패의 색/냄새 비침. enemy bar/예고/턴이 최소 한 번은 체감되어야 함.
    previous: [fo-astrid-meet]
    next: [fo-warrior-awaken]
    choices:
      - id: fight-swing
        label: 늑대의 옆구리를 노린다
        condition:
          item: rusted-sword
        outcome:
          statDelta:
            hp: -1
          enemyDamage: 3
          knowledgeGain: [templar-creed, astrid-respect]
          nextNodeId: fo-warrior-awaken
      - id: fight-cover
        label: 아스트리드 뒤로 물러선다
        outcome:
          enemyDamage: 2
          knowledgeGain: [astrid-doubt]
          nextNodeId: fo-warrior-awaken

  - id: fo-warrior-awaken
    type: event
    beat: 전투 후 정적. 아스트리드의 의심 한 줄 + 너의 손이 검을 알고 있는 인식. 클래스 정체성 확정 직전.
    personas: [narrator, astrid]
    toneTarget: 첫 클래스 각성. 정체성 확정 비트. 정적 + 무게.
    previous: [fo-astrid-fight]
    next: [fo-converge]
    choices:
      - id: awaken-warrior
        label: 검을 놓지 않는다
        outcome:
          classSet: warrior
          knowledgeGain: [warrior-awakened]
          nextNodeId: fo-converge

  - id: fo-bayren-meet
    type: encounter
    beat: 베일런 노사 첫 등장 — 부서진 마차 옆 모닥불, 까칠. 양피지 보면 눈썹 한 번.
    personas: [narrator, bayren-rosa]
    toneTarget: 까칠 + 직업적 관심. 도와주는 게 아니라 시험하는 결.
    previous: [fo-fork]
    next: [fo-bayren-rune]
    choices:
      - id: bayren-ask
        label: 이 글자, 읽을 수 있나?
        outcome:
          heroEncounter: bayren-rosa
          nextNodeId: fo-bayren-rune
      - id: bayren-greet
        label: 여긴 어디로 가는 길이야?
        outcome:
          heroEncounter: bayren-rosa
          nextNodeId: fo-bayren-rune

  - id: fo-bayren-rune
    type: event
    beat: 노인이 흙바닥에 세 줄 룬 그림. "한 번. 딱 한 번 외워봐." 시험.
    personas: [narrator, bayren-rosa]
    toneTarget: 시험 통과의 정적. 단어가 너의 입에서 너의 것 아닌 결로 나옴. mana 소진 = 정신력 즉물성.
    previous: [fo-bayren-meet]
    next: [fo-mage-awaken]
    choices:
      - id: rune-recite
        label: 숨을 고르고 따라 읽는다
        outcome:
          statDelta:
            mana: -1
          knowledgeGain: [rune-fundamentals, bayren-respect]
          nextNodeId: fo-mage-awaken
      - id: rune-falter
        label: 첫 음절에서 멈칫한다
        outcome:
          statDelta:
            mana: -1
          nextNodeId: fo-mage-awaken

  - id: fo-mage-awaken
    type: event
    beat: 노인 인정 + 부탁. 클래스 정체성 확정 + 다음 목적 부여.
    personas: [narrator, bayren-rosa]
    toneTarget: 첫 클래스 각성. 노인 인정은 짧음, 부탁이 더 무게 있음. 다음 지역 어두운 쪽 암시.
    previous: [fo-bayren-rune]
    next: [fo-converge]
    choices:
      - id: awaken-mage
        label: 룬을 다시 입에 올린다
        outcome:
          classSet: mage
          knowledgeGain: [mage-awakened]
          nextNodeId: fo-converge

  - id: fo-converge
    type: encounter
    beat: 합류 + 위협 고조. 이방인 혼자 (아스트리드/베일런 노사 모두 각성 후 떠남). 풀이 검게 변함. 새소리 사라짐. 단 냄새.
    personas: [narrator]
    toneTarget: 위협 고조. 침묵의 변화. 풍경의 색/소리/냄새가 점점 어두워짐. narrator 차분함이 더 무거움.
    previous: [fo-warrior-awaken, fo-mage-awaken]
    next: [fo-boss-tree]
    choices:
      - id: conv-march
        label: 검게 시든 길을 따라간다
        outcome:
          nextNodeId: fo-boss-tree
      - id: conv-watch
        label: 뿌리 사이를 살피며 간다
        outcome:
          knowledgeGain: [corruption-witnessed]
          nextNodeId: fo-boss-tree

  - id: fo-boss-tree
    type: combat
    enemyId: corrupted-tree
    beat: 부패한 거대 나무 — 의인화된 식물. 이방인 혼자 (동반자 없음). 너의 이름이 아닌 무언가를 부른다 (외신 결). corrupted-tree hp 8 — 클래스 행동 2회 결판으로 첫 보스의 무게를 만든다.
    personas: [narrator]
    toneTarget: 보스 도착. 위협 정점. 외신 결 핵심. 클래스별 출력 차별화. 도망은 잔향이 길다. enemy bar/뿌리 예고/자원 소모가 무게를 더함.
    previous: [fo-converge]
    next: [fo-resolution]
    choices:
      - id: boss-sword
        label: 뿌리 깊은 곳을 벤다
        condition:
          class: warrior
          item: rusted-sword
        outcome:
          statDelta:
            hp: -1
          enemyDamage: 4
          nextNodeId: fo-resolution
      - id: boss-rune
        label: 룬을 뿌리에 박아 넣는다
        condition:
          class: mage
        outcome:
          statDelta:
            mana: -1
          enemyDamage: 4
          itemRemove: [old-scroll]
          nextNodeId: fo-resolution
      - id: boss-herb
        label: 마른 약초를 씹는다
        condition:
          item: dried-herb
        outcome:
          statDelta:
            hp: 1
          itemRemove: [dried-herb]
          enemyDamage: 0
          nextNodeId: null
      - id: boss-flee
        label: 뒤돌아 달린다
        outcome:
          enemyDamage: 8
          knowledgeGain: [fled-tree]
          nextNodeId: fo-resolution

  - id: fo-resolution
    type: ending
    beat: 1지역 끝. 어떤 결로 왔든 살아 돌아왔다는 결판. 회색의 자 마지막 한 줄. 산맥 (2지역) 암시.
    personas: [narrator, gray-one]
    toneTarget: 결판 정서. 살아 돌아온 자의 안도 (또는 어둠). 거대 나무 운명 모호 — "안개 너머의 일". 마지막 단락은 개발용 메타 마커.
    previous: [fo-boss-tree]
    next: []
    echoes:
      - condition:
          knowledge: fled-tree
        text: |-
          등 뒤에서 나무가 부르던 이름이 한 박자 더 멀리서 들린다. 너는 돌아보지 않는다.
      - condition:
          knowledge: warrior-awakened
        text: |-
          검의 무게가 손에 자리 잡았다. 옆구리의 베인 자리는 더 가벼워진다.
      - condition:
          knowledge: mage-awakened
        text: |-
          양피지가 사라진 손에 룬 한 줄의 잔향이 남는다. 흙 위에 그려진 글자처럼.
    choices: []
