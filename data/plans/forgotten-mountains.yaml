region: forgotten-mountains
name: 잊혀진 산맥
description: |-
  본래 마왕에 맞서 싸우던 사람들의 거점이었던 폐허 도시. 마왕 4 장수 중 하나가
  점령하고 있다. 차가운 바람과 무너진 첨탑들.
entry: fm-arrive
boss: fm-boss

nodes:
  - id: fm-arrive
    type: encounter
    beat: 산맥 입구 도착. 차가운 바람. 능선 너머로 무너진 첨탑들이 보임. 이방인 혼자.
    personas: [narrator]
    toneTarget: 입문보다 무게. 차가움 + 폐허. 1지역 안개와 다른 결.
    previous: []
    next: [fm-watcher]
    choices:
      - id: arrive-look
        label: 능선 너머를 본다
        outcome:
          knowledgeGain: [ruined-city-glimpse]
          nextNodeId: fm-watcher
      - id: arrive-walk
        label: 그냥 걸어 들어간다
        outcome:
          nextNodeId: fm-watcher

  - id: fm-watcher
    type: event
    beat: 망가진 망루. 회색의 자가 짧게 다시 등장 — 폐허 도시의 역사 단서를 흘린다.
    personas: [narrator, gray-one]
    toneTarget: 회색의 자의 짧은 단서. 도시 역사의 무게. 정체는 여전히 안 흘림.
    previous: [fm-arrive]
    next: [fm-street]
    echoes:
      - condition:
          knowledge: trusted-stranger
        text: |-
          회색의 자: "...너의 발걸음이 가벼워졌군. 알고 있었다."
      - condition:
          knowledge: rejected-stranger
        text: |-
          회색의 자: "그래도 너는 다시 왔다."

          그의 어조에 흔들림이 없다.
      - condition:
          knowledge: fled-tree
        text: |-
          회색의 자: "한 번 등을 돌린 자도, 또 다른 등을 마주한다."
    choices:
      - id: watcher-ask
        label: 이 도시는 무엇이었는가
        outcome:
          knowledgeGain: [city-history]
          nextNodeId: fm-street
      - id: watcher-silent
        label: 묻지 않는다
        outcome:
          nextNodeId: fm-street

  - id: fm-street
    type: encounter
    beat: 폐허 거리 진입. 길에 마왕 군세 깃발 — 검은 천에 붉은 표식. 이방인 혼자.
    personas: [narrator]
    toneTarget: 처음 보는 마왕 군세의 흔적. 위협이 사람 형태로 옴. 침묵의 거리.
    previous: [fm-watcher]
    next: [fm-fork]
    choices:
      - id: street-observe
        label: 깃발을 살핀다
        outcome:
          knowledgeGain: [mawang-banner]
          nextNodeId: fm-fork
      - id: street-rush
        label: 곧장 안쪽으로
        outcome:
          nextNodeId: fm-fork

  - id: fm-fork
    type: encounter
    beat: 갈림길. 무너진 거리 정면 vs 지하 통로 입구. 둘 다 광장으로 이어짐. 가지 진입 (사당 / 샛길) 두 개 추가 — gate 없음.
    personas: [narrator]
    toneTarget: 잠입 vs 정면. 둘 다 무게 있음. 선택이 곧 결판으로 가는 길의 결을 정함. 가지 분기는 무게보다 호흡.
    previous: [fm-street]
    next: [fm-tunnel, fm-front-fight, fm-rest-shrine, fm-discovery-banner]
    choices:
      - id: fork-tunnel
        label: 지하 통로로 들어간다
        outcome:
          nextNodeId: fm-tunnel
      - id: fork-front
        label: 거리로 정면 돌파
        outcome:
          nextNodeId: fm-front-fight
      - id: fork-shrine
        label: 사당으로 향한다
        outcome:
          nextNodeId: fm-rest-shrine
      - id: fork-side-banner
        label: 다른 길을 살핀다
        outcome:
          nextNodeId: fm-discovery-banner

  - id: fm-tunnel
    type: encounter
    beat: 지하 통로 — 어둡고 좁음. 위쪽에서 군세 발자국 소리. 이방인 혼자. W9 — 새 가지 진입 (fm-tunnel-fight) 추가.
    personas: [narrator]
    toneTarget: 어둠 + 발자국 소리. 긴장. 빠르게 vs 조용히 vs 마주치기의 대비.
    previous: [fm-fork]
    next: [fm-tunnel-exit, fm-tunnel-fight]
    choices:
      - id: tunnel-quiet
        label: 조용히 지나간다
        outcome:
          nextNodeId: fm-tunnel-exit
      - id: tunnel-fast
        label: 빠르게 통과
        outcome:
          statDelta:
            hp: -1
          nextNodeId: fm-tunnel-exit
      - id: tunnel-confront
        label: 발자국을 향해 올라간다
        outcome:
          nextNodeId: fm-tunnel-fight

  - id: fm-tunnel-fight
    type: combat
    enemyId: demon-vanguard
    beat: 통로 안의 척후병 조우 (W9 추가). 좁은 어둠에서 단검과 칼이 부딪힘. fm-front-fight 와 차별 — 좁은 공간 결.
    personas: [narrator]
    toneTarget: 1지역 늑대보다 무거움. 거리 정면(fm-front-fight)과 차별 — 좁음 + 어둠 + 한 발 물러설 자리 없음.
    previous: [fm-tunnel]
    next: [fm-tunnel-exit]
    choices:
      - id: tunnel-fight-strike
        label: 먼저 친다
        outcome:
          statDelta:
            hp: -1
          enemyDamage: 6
          nextNodeId: fm-tunnel-exit
      - id: tunnel-fight-pin
        label: 벽으로 몰아붙인다
        outcome:
          statDelta:
            hp: -2
          enemyDamage: 6
          nextNodeId: fm-tunnel-exit

  - id: fm-tunnel-exit
    type: encounter
    beat: 통로 출구. 광장 진입 직전. 빛이 한 줄.
    personas: [narrator]
    toneTarget: 다음 비트로 가는 호흡. 잠깐의 정적.
    previous: [fm-tunnel]
    next: [fm-square]
    choices:
      - id: tunnel-listen
        label: 잠시 멈춰 듣는다
        outcome:
          nextNodeId: fm-square
      - id: tunnel-emerge
        label: 곧장 나간다
        outcome:
          nextNodeId: fm-square

  - id: fm-front-fight
    type: combat
    enemyId: demon-vanguard
    beat: 거리 순찰병 조우 + 첫 전투. 늑대가 아닌 사람 형태의 적. W9 — enemyId 매핑 (demon-vanguard hp 6) — 1턴 결판.
    personas: [narrator]
    toneTarget: 인간 적과의 전투. 1지역 늑대보다 무거움. 회피도 비용 있음. 엔진의 단검 예고가 무게를 더함.
    previous: [fm-fork]
    next: [fm-front-tower]
    choices:
      - id: fight-engage
        label: 맞선다
        outcome:
          statDelta:
            hp: -2
          enemyDamage: 6
          nextNodeId: fm-front-tower
      - id: fight-evade
        label: 회피해서 지나친다
        outcome:
          statDelta:
            mana: -1
          enemyDamage: 6
          nextNodeId: fm-front-tower

  - id: fm-front-tower
    type: rest
    beat: 망루 점령. 잠깐 호흡. 광장과 도시 전체를 내려다봄. 적의 규모를 처음 가늠함.
    personas: [narrator]
    toneTarget: 잠깐의 안식 + 위협의 규모. 도시 전체 조망. 잔잔하지만 무거움.
    previous: [fm-front-fight]
    next: [fm-square]
    choices:
      - id: tower-survey
        label: 주변을 둘러본다
        outcome:
          knowledgeGain: [mawang-banner]
          nextNodeId: fm-square
      - id: tower-press
        label: 곧장 다음으로
        outcome:
          nextNodeId: fm-square

  - id: fm-square
    type: event
    beat: 도시 중심 광장. 그림자 사령관 등장. 분노가 아니라 슬픔. 정중한 톤.
    personas: [narrator, shadow-commander]
    toneTarget: 사령관 첫 등장. 적이지만 적개심 X. 그의 슬픔이 무거움. 정중한 어조.
    previous: [fm-tunnel-exit, fm-front-tower]
    next: [fm-boss]
    choices:
      - id: square-confront
        label: 사령관에게 다가간다
        outcome:
          heroEncounter: shadow-commander
          knowledgeGain: [shadow-commander-glimpse]
          nextNodeId: fm-boss
      - id: square-pause
        label: 잠시 거리 둔다
        outcome:
          heroEncounter: shadow-commander
          knowledgeGain: [shadow-commander-glimpse]
          nextNodeId: fm-boss

  - id: fm-boss
    type: combat
    enemyId: shadow-commander
    beat: 그림자 사령관 보스전. 그가 칼을 든다. 행동(어깨 들썩임, 칼끝 흔들리지 않음)으로만 결을 보여줌. 이방인 혼자, 사령관 단독. W9 — 5턴 3페이즈 (shadow-commander hp 12, atTurn 3 분노 / atTurn 5 결정타).
    personas: [narrator, shadow-commander]
    toneTarget: 보스전 정점. 사령관 결은 행동으로만 — narrator 가 "분노/의무" 같은 동기 단언 X. 클래스별 출력 차별은 사령관 대사에서만. 전사에게 templar 단서 한 줄, 마법사에게 짧은 정중한 거절. 페이즈 전환은 enemy 예고 텍스트로만 비춤 (페이즈 1 cut-low/high → 페이즈 2 wrath-step/strike → 페이즈 3 final-blow).
    previous: [fm-square]
    next: [fm-resolution]
    choices:
      - id: boss-warrior
        label: 검으로 맞선다
        condition:
          class: warrior
        outcome:
          statDelta:
            hp: -1
          enemyDamage: 3
          nextNodeId: fm-resolution
      - id: boss-mage
        label: 룬으로 침식을 끊는다
        condition:
          class: mage
        outcome:
          statDelta:
            mana: -1
          enemyDamage: 3
          nextNodeId: fm-resolution
      - id: boss-flee
        label: 도망친다
        outcome:
          enemyDamage: 12
          knowledgeGain: [fled-shadow]
          nextNodeId: fm-resolution

  - id: fm-resolution
    type: ending
    beat: 결판. 사령관 처치 또는 도주. 그의 마지막 한 줄. 다음 지역 (재의 황무지) 암시.
    personas: [narrator, shadow-commander, gray-one]
    toneTarget: 결판 정서. 사령관 마지막 한 줄 ("...고맙다." 결). 황무지 가리킴. 마지막 단락은 개발용 메타 마커.
    previous: [fm-boss]
    next: []
    echoes:
      - condition:
          knowledge: fled-shadow
        text: |-
          사령관이 너를 부르지 않은 것이 어깨에 남는다. 마지막 "고맙다"는 너의 것이 아니다.
      - condition:
          knowledge: astrid-respect
        text: |-
          아스트리드의 검이 잠깐 떠오른다. 그녀는 여기 없다. 그녀의 신앙 한 줄만 너의 안쪽에 머문다.
      - condition:
          knowledge: astrid-doubt
        text: |-
          아스트리드는 너를 동지로 보지 않았었다. 그녀의 침묵이 사령관의 침묵과 같은 결로 너에게 닿는다.
    choices: []

  - id: fm-rest-shrine
    type: rest
    beat: 폐허 사당 휴식. 무너진 첨탑 그늘의 작은 사당. HP +1. 사당 뒤편에서 탈영자 인기척 — fm-shop-deserter 진입로.
    personas: [narrator]
    toneTarget: 차고 무거운 산맥 톤 안의 짧은 따뜻함. 기도문 자국, 한 박자 따뜻한 공기. narrator 외부 관찰만.
    previous: [fm-fork]
    next: [fm-fork, fm-shop-deserter]
    choices:
      - id: rest-pray
        label: 사당 앞에 잠시 무릎을 꿇는다
        outcome:
          statDelta:
            hp: 1
          nextNodeId: fm-fork
      - id: rest-back
        label: 사당 뒤편의 인기척을 살핀다
        outcome:
          nextNodeId: fm-shop-deserter
      - id: rest-leave
        label: 그대로 길로 돌아간다
        outcome:
          nextNodeId: fm-fork

  - id: fm-shop-deserter
    type: shop
    beat: 사당 뒤편의 탈영자 거래. 갑옷 표식이 칼로 긁힌 자. HP↔MP 양방향 거래 두 종 + 떠나기. heroEncounter=deserter.
    personas: [narrator, deserter]
    toneTarget: 마른 어조. 정중하지만 짧음. 본명 안 말함. 사령관 결과 차별 — 그는 자리 지키는 자, 탈영자는 자리 떠난 자.
    previous: [fm-rest-shrine]
    next: [fm-fork]
    choices:
      - id: deserter-trade-mp
        label: 피로 길의 결을 산다 (HP -1, MP +2)
        outcome:
          statDelta:
            hp: -1
            mana: 2
          heroEncounter: deserter
          nextNodeId: fm-fork
      - id: deserter-trade-hp
        label: 주문 한 줄을 내주고 호흡을 산다 (MP -1, HP +2)
        outcome:
          statDelta:
            mana: -1
            hp: 2
          heroEncounter: deserter
          nextNodeId: fm-fork
      - id: deserter-leave
        label: 거래하지 않고 떠난다
        outcome:
          heroEncounter: deserter
          nextNodeId: fm-fork

  - id: fm-discovery-banner
    type: event
    beat: 샛길의 무너진 군세 깃대. 검은 천 + 붉은 표식. 누군가 의도적으로 부순 자국. shadow-banner knowledge.
    personas: [narrator]
    toneTarget: 잠식의 결과 함께 저항의 결도 읽힘. mawang-banner 와 차별 — 그건 거점 표시, shadow-banner 는 부서진 자국.
    previous: [fm-fork]
    next: [fm-fork]
    choices:
      - id: banner-touch
        label: 깃대에 손을 댄다
        outcome:
          knowledgeGain: [shadow-banner]
          nextNodeId: fm-fork
      - id: banner-pass
        label: 그대로 지나친다
        outcome:
          nextNodeId: fm-fork
