<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>chat-rpg dev editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #09090b; color: #f4f4f5; }
    textarea { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; line-height: 1.7; }
    /* Critical layout — inline so it works without Tailwind */
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .lay-main { flex: 1 1 0%; display: flex; overflow: hidden; min-height: 0; }
    .lay-sidebar { width: 18rem; display: flex; flex-direction: column; min-height: 0; background: #18181b; border-right: 1px solid #27272a; }
    .lay-sidebar-list { flex: 1 1 0%; overflow-y: auto; min-height: 0; }
    .lay-editor { flex: 1 1 0%; display: flex; overflow: hidden; min-height: 0; }
    .lay-editor-main { flex: 1 1 0%; overflow-y: auto; padding: 1.5rem; }
    .lay-editor-side { width: 20rem; border-left: 1px solid #27272a; background: #18181b; overflow-y: auto; padding: 1rem; }
    .loading-fallback { padding: 2rem; color: #71717a; }
    .err-box { position: fixed; bottom: 1rem; right: 1rem; max-width: 24rem; background: #7f1d1d; color: #fee2e2; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-family: ui-monospace, monospace; white-space: pre-wrap; z-index: 50; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div id="root">
    <div class="loading-fallback">로딩 중... (이 메시지가 계속 뜨면 JS 실행 안 되는 상태. F12 콘솔 확인)</div>
  </div>
  <div id="err-display"></div>
  <script>
    window.addEventListener('error', (e) => {
      const box = document.getElementById('err-display')
      if (box) box.innerHTML = '<div class="err-box">JS ERROR: ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || '?') + '</div>'
    })
    window.addEventListener('unhandledrejection', (e) => {
      const box = document.getElementById('err-display')
      if (box) box.innerHTML = '<div class="err-box">PROMISE REJECT: ' + (e.reason?.message || e.reason || 'unknown') + '</div>'
    })
  </script>

  <script type="module">
    const $ = (sel, ctx = document) => ctx.querySelector(sel)
    const el = (tag, attrs, ...children) => {
      const e = document.createElement(tag)
      for (const [k, v] of Object.entries(attrs ?? {})) {
        if (k === 'class') e.className = v
        else if (k === 'onclick') e.onclick = v
        else if (k === 'oninput') e.oninput = v
        else if (k === 'onchange') e.onchange = v
        else if (k === 'value') e.value = v
        else if (v !== undefined && v !== null) e.setAttribute(k, v)
      }
      for (const c of children.flat()) {
        if (c == null) continue
        if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c))
        else e.appendChild(c)
      }
      return e
    }

    const REGIONS_LABEL = {}

    const state = {
      regions: [],
      nodes: [],
      reviews: {},
      activeRegion: null,
      activeNodeId: null,
      filter: 'all', // all | fail | warn | clean
      search: '',
      dirty: false,
      lintResult: null,
    }

    async function api(path, opts = {}) {
      const r = await fetch(path, opts)
      if (!r.ok) {
        const text = await r.text()
        throw new Error(`${path}: ${r.status} ${text}`)
      }
      return r.json()
    }

    async function loadAll() {
      const [regions, nodes, reviews] = await Promise.all([
        api('/api/regions'),
        api('/api/nodes'),
        api('/api/reviews'),
      ])
      state.regions = regions
      regions.forEach((r) => (REGIONS_LABEL[r.id] = r.label))
      state.nodes = nodes
      state.reviews = reviews
      if (!state.activeRegion) state.activeRegion = regions[0]?.id
      render()
    }

    function getReviewStatus(nodeId) {
      const r = state.reviews[nodeId]
      if (!r) return { tag: 'none', score: null, structureOk: true, issues: [] }
      const sum = (r.voiceMatch ?? 0) + (r.toneMatch ?? 0)
      const passes = sum >= 8 && r.structureOk !== false
      const tag = passes ? (r.issues?.length > 0 ? 'warn' : 'clean') : 'fail'
      return { tag, sum, voice: r.voiceMatch, tone: r.toneMatch, structureOk: r.structureOk, issues: r.issues ?? [] }
    }

    function nodesForRegion(regionId) {
      return state.nodes.filter((n) => n._region === regionId)
    }

    function filteredNodesForRegion(regionId) {
      const filter = state.filter
      const search = state.search.trim().toLowerCase()
      return nodesForRegion(regionId).filter((n) => {
        const s = getReviewStatus(n.id)
        if (filter === 'fail' && s.tag !== 'fail') return false
        if (filter === 'warn' && s.tag !== 'warn') return false
        if (filter === 'clean' && s.tag !== 'clean') return false
        if (search && !(n.id.toLowerCase().includes(search) || (n.description ?? '').toLowerCase().includes(search))) return false
        return true
      })
    }

    function gotoSibling(direction) {
      // direction: -1 = prev, +1 = next. Wraps within current region's filtered list.
      const node = getActiveNode()
      if (!node) return
      if (state.dirty && !confirm('저장하지 않은 변경사항이 있어요. 버릴까요?')) return
      const list = filteredNodesForRegion(state.activeRegion)
      const idx = list.findIndex((n) => n.id === node.id)
      if (idx === -1) return
      const nextIdx = (idx + direction + list.length) % list.length
      state.activeNodeId = list[nextIdx].id
      state.dirty = false
      render()
    }

    function badge(label, cls) {
      return el('span', { class: `inline-block rounded px-1.5 py-0.5 text-xs font-mono ${cls}` }, label)
    }

    function statusBadge(status) {
      if (status.tag === 'fail') return badge(`✗ ${status.voice}+${status.tone}${!status.structureOk ? '✗' : ''}`, 'bg-red-900 text-red-100')
      if (status.tag === 'warn') return badge(`⚠ ${status.voice}+${status.tone}${!status.structureOk ? '✗' : ''}`, 'bg-amber-900 text-amber-100')
      if (status.tag === 'clean') return badge(`✓ ${status.voice}+${status.tone}`, 'bg-emerald-900 text-emerald-100')
      return badge('-', 'bg-zinc-800 text-zinc-400')
    }

    function renderRegionTabs() {
      return el('div', { class: 'flex gap-1 border-b border-zinc-800 px-3 py-2 bg-zinc-900' },
        ...state.regions.map((r) => {
          const active = state.activeRegion === r.id
          const list = nodesForRegion(r.id)
          const counts = list.reduce((acc, n) => {
            const s = getReviewStatus(n.id)
            acc[s.tag] = (acc[s.tag] || 0) + 1
            return acc
          }, {})
          const failCount = counts.fail || 0
          const warnCount = counts.warn || 0
          return el('button', {
            class: `px-3 py-1.5 rounded text-sm font-medium transition ${active ? 'bg-zinc-700 text-white' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}`,
            onclick: () => { state.activeRegion = r.id; state.activeNodeId = null; render() },
          },
            r.label,
            failCount > 0 ? el('span', { class: 'ml-2 text-xs text-red-400' }, `${failCount}✗`) : null,
            warnCount > 0 ? el('span', { class: 'ml-1 text-xs text-amber-400' }, `${warnCount}⚠`) : null,
          )
        }),
        el('div', { class: 'flex-1' }),
        el('button', {
          class: 'ml-2 px-3 py-1.5 rounded text-sm bg-blue-700 hover:bg-blue-600',
          onclick: runLint,
        }, 'lint:data'),
      )
    }

    function renderNodeList() {
      const region = state.activeRegion
      const filtered = filteredNodesForRegion(region)

      return el('div', { class: 'lay-sidebar w-72 border-r border-zinc-800 flex flex-col bg-zinc-900' },
        el('div', { class: 'p-2 border-b border-zinc-800 space-y-2' },
          el('input', {
            type: 'text',
            placeholder: '검색 (id 또는 본문)',
            value: state.search,
            class: 'w-full px-2 py-1 rounded bg-zinc-800 text-sm border border-zinc-700 focus:border-zinc-500 outline-none',
            style: 'width: 100%; padding: 0.25rem 0.5rem; border-radius: 0.25rem; background: #27272a; color: #f4f4f5; border: 1px solid #3f3f46;',
            oninput: (e) => { state.search = e.target.value; render() },
          }),
          el('div', { class: 'flex gap-1 text-xs', style: 'display: flex; gap: 0.25rem;' },
            ...['all', 'fail', 'warn', 'clean'].map((f) =>
              el('button', {
                class: `px-2 py-1 rounded ${state.filter === f ? 'bg-zinc-700' : 'bg-zinc-800 hover:bg-zinc-700'}`,
                style: `padding: 0.25rem 0.5rem; border-radius: 0.25rem; background: ${state.filter === f ? '#3f3f46' : '#27272a'}; color: #f4f4f5; border: none; cursor: pointer; font-size: 0.75rem;`,
                onclick: () => { state.filter = f; render() },
              }, f)
            ),
          ),
        ),
        el('div', { class: 'lay-sidebar-list flex-1 overflow-y-auto' },
          filtered.length === 0
            ? el('div', { class: 'p-4 text-zinc-500 text-sm' }, '(없음)')
            : el('div', { class: 'divide-y divide-zinc-800' },
                ...filtered.map((n) => {
                  const status = getReviewStatus(n.id)
                  const active = state.activeNodeId === n.id
                  return el('button', {
                    class: `w-full text-left px-3 py-2 text-sm transition ${active ? 'bg-zinc-800' : 'hover:bg-zinc-850 hover:bg-opacity-50'}`,
                    onclick: () => {
                      if (state.dirty && !confirm('저장하지 않은 변경사항이 있어요. 버릴까요?')) return
                      state.activeNodeId = n.id
                      state.dirty = false
                      render()
                    },
                  },
                    el('div', { class: 'flex items-center gap-2 mb-0.5' },
                      statusBadge(status),
                      el('span', { class: 'text-xs text-zinc-500 font-mono' }, n.type),
                    ),
                    el('div', { class: 'font-mono text-zinc-200' }, n.id),
                  )
                })
              )
        ),
      )
    }

    function getActiveNode() {
      return state.nodes.find((n) => n.id === state.activeNodeId) ?? null
    }

    function updateActiveField(path, value) {
      const node = getActiveNode()
      if (!node) return
      // path is like 'description' or 'choices[0].outcome.text'
      const parts = path.replace(/\[(\d+)\]/g, '.$1').split('.')
      let cur = node
      for (let i = 0; i < parts.length - 1; i++) {
        cur = cur[parts[i]]
        if (cur === undefined) return
      }
      cur[parts[parts.length - 1]] = value
      state.dirty = true
      // Just update header dirty indicator without full re-render (textareas keep focus)
      const di = document.getElementById('dirty-indicator')
      if (di) di.textContent = '● 미저장'
    }

    function autoresize(textarea) {
      textarea.style.height = 'auto'
      textarea.style.height = textarea.scrollHeight + 'px'
    }

    function makeTextarea(value, onInput, opts = {}) {
      const ta = el('textarea', {
        class: `w-full px-3 py-2 rounded bg-zinc-800 border border-zinc-700 focus:border-zinc-500 outline-none text-zinc-100 resize-none ${opts.class ?? ''}`,
        rows: opts.rows ?? 3,
        oninput: (e) => { onInput(e.target.value); autoresize(e.target) },
      })
      ta.value = value ?? ''
      // Resize after mount
      requestAnimationFrame(() => autoresize(ta))
      return ta
    }

    function renderEditor() {
      const node = getActiveNode()
      if (!node) {
        return el('div', {
          class: 'lay-editor flex-1 flex items-center justify-center text-zinc-500',
          style: 'flex: 1 1 0%; display: flex; align-items: center; justify-content: center; color: #71717a;',
        }, '왼쪽에서 노드 선택')
      }

      const review = state.reviews[node.id]
      const status = getReviewStatus(node.id)

      return el('div', { class: 'lay-editor flex-1 flex overflow-hidden' },
        // Editor column
        el('div', { class: 'lay-editor-main flex-1 overflow-y-auto p-6 space-y-6' },
          // Header
          (() => {
            const list = filteredNodesForRegion(node._region)
            const idx = list.findIndex((n) => n.id === node.id)
            const total = list.length
            return el('div', { class: 'flex items-center gap-3 pb-3 border-b border-zinc-800' },
              el('div', { class: 'flex-1' },
                el('div', { class: 'text-xs text-zinc-500 font-mono' }, `${REGIONS_LABEL[node._region]} · ${node.type}${idx >= 0 ? ` · ${idx + 1}/${total}` : ''}`),
                el('div', { class: 'text-xl font-mono text-zinc-100' }, node.id),
              ),
              statusBadge(status),
              el('span', { id: 'dirty-indicator', class: 'text-xs text-amber-400' }, state.dirty ? '● 미저장' : ''),
              el('button', {
                class: 'px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-sm',
                style: 'padding: 0.375rem 0.75rem; border-radius: 0.25rem; background: #27272a; color: #f4f4f5; border: none; cursor: pointer; font-size: 0.875rem;',
                title: '이전 노드 (Ctrl/Cmd+J)',
                onclick: () => gotoSibling(-1),
              }, '← 이전'),
              el('button', {
                class: 'px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700 text-sm',
                style: 'padding: 0.375rem 0.75rem; border-radius: 0.25rem; background: #27272a; color: #f4f4f5; border: none; cursor: pointer; font-size: 0.875rem;',
                title: '다음 노드 (Ctrl/Cmd+K)',
                onclick: () => gotoSibling(1),
              }, '다음 →'),
              el('button', {
                class: 'px-4 py-1.5 rounded bg-emerald-700 hover:bg-emerald-600 text-sm font-medium',
                style: 'padding: 0.375rem 1rem; border-radius: 0.25rem; background: #047857; color: white; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500;',
                onclick: saveActive,
              }, '저장'),
            )
          })(),

          // Description
          el('div', null,
            el('label', { class: 'block text-xs text-zinc-400 mb-1.5 font-mono' }, 'description'),
            makeTextarea(node.description, (v) => updateActiveField('description', v), { rows: 5 }),
          ),

          // Echoes
          (node.echoes ?? []).length > 0
            ? el('div', null,
                el('div', { class: 'text-xs text-zinc-400 mb-2 font-mono' }, `echoes (${node.echoes.length})`),
                el('div', { class: 'space-y-2' },
                  ...node.echoes.map((echo, i) =>
                    el('div', { class: 'border border-zinc-800 rounded p-3 bg-zinc-900' },
                      el('div', { class: 'text-xs text-zinc-500 font-mono mb-1.5' },
                        echo.condition
                          ? `condition: ${JSON.stringify(echo.condition)}`
                          : '(no condition)'
                      ),
                      makeTextarea(echo.text, (v) => updateActiveField(`echoes[${i}].text`, v), { rows: 2 }),
                    )
                  )
                ),
              )
            : null,

          // Choices
          (node.choices ?? []).length > 0
            ? el('div', null,
                el('div', { class: 'text-xs text-zinc-400 mb-2 font-mono' }, `choices (${node.choices.length})`),
                el('div', { class: 'space-y-3' },
                  ...node.choices.map((choice, i) =>
                    el('div', { class: 'border border-zinc-800 rounded p-3 bg-zinc-900 space-y-2' },
                      el('div', { class: 'flex items-baseline gap-2' },
                        el('span', { class: 'text-xs text-zinc-500 font-mono' }, `[${choice.id}]`),
                        choice.condition ? el('span', { class: 'text-xs text-amber-500 font-mono' }, JSON.stringify(choice.condition)) : null,
                        choice.startsCombat !== undefined ? el('span', { class: 'text-xs text-blue-400 font-mono' }, `startsCombat: ${choice.startsCombat}`) : null,
                      ),
                      el('div', null,
                        el('label', { class: 'block text-xs text-zinc-400 mb-1' }, 'choice text (라벨)'),
                        makeTextarea(choice.text, (v) => updateActiveField(`choices[${i}].text`, v), { rows: 1, class: 'resize-none' }),
                      ),
                      el('div', null,
                        el('label', { class: 'block text-xs text-zinc-400 mb-1' }, 'outcome.text'),
                        makeTextarea(choice.outcome?.text ?? '', (v) => updateActiveField(`choices[${i}].outcome.text`, v), { rows: 3 }),
                      ),
                      el('div', { class: 'text-xs text-zinc-500 font-mono' },
                        ...['statDelta', 'enemyDamage', 'itemAdd', 'itemRemove', 'knowledgeGain', 'classSet', 'heroEncounter']
                          .filter((k) => choice.outcome?.[k] !== undefined)
                          .map((k) => el('span', { class: 'mr-3' }, `${k}: ${JSON.stringify(choice.outcome[k])}`)),
                        choice.outcome?.nextNodeId !== undefined
                          ? el('span', { class: 'mr-3' }, `next: ${choice.outcome.nextNodeId}`)
                          : null,
                      ),
                    )
                  )
                ),
              )
            : null,
        ),

        // Diagnostic panel
        el('div', { class: 'lay-editor-side w-80 border-l border-zinc-800 bg-zinc-900 overflow-y-auto p-4 text-sm' },
          el('div', { class: 'text-xs text-zinc-400 mb-3 font-mono uppercase tracking-wide' }, 'diagnostic'),
          review
            ? el('div', { class: 'space-y-3' },
                el('div', { class: 'flex gap-3 text-sm' },
                  el('div', null, el('span', { class: 'text-zinc-500' }, 'voice '), el('span', { class: 'font-mono' }, `${review.voiceMatch}/5`)),
                  el('div', null, el('span', { class: 'text-zinc-500' }, 'tone '), el('span', { class: 'font-mono' }, `${review.toneMatch}/5`)),
                  el('div', null, el('span', { class: 'text-zinc-500' }, 'struct '), el('span', { class: 'font-mono' }, review.structureOk ? 'OK' : '✗')),
                ),
                review.issues?.length > 0
                  ? el('div', null,
                      el('div', { class: 'text-xs text-zinc-400 mb-1' }, `issues (${review.issues.length})`),
                      el('ul', { class: 'space-y-2 text-xs leading-relaxed' },
                        ...review.issues.map((iss) =>
                          el('li', { class: 'text-zinc-300 border-l-2 border-amber-700 pl-2' }, iss)
                        )
                      ),
                    )
                  : el('div', { class: 'text-zinc-500 text-xs' }, '(이슈 없음)'),
              )
            : el('div', { class: 'text-zinc-500 text-xs' }, '(이 노드 진단 데이터 없음)'),

          state.lintResult
            ? el('div', { class: 'mt-6 pt-4 border-t border-zinc-800' },
                el('div', { class: 'text-xs text-zinc-400 mb-1 font-mono uppercase tracking-wide' }, 'lint:data 결과'),
                el('pre', { class: 'text-xs whitespace-pre-wrap font-mono ' + (state.lintResult.code === 0 ? 'text-emerald-300' : 'text-red-300') },
                  (state.lintResult.stdout || '') + (state.lintResult.stderr || '')
                ),
              )
            : null,
        ),
      )
    }

    async function saveActive() {
      const node = getActiveNode()
      if (!node) return
      const { _region, _file, ...clean } = node
      try {
        await api(`/api/nodes/${_region}/${_file}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(clean, null, 2),
        })
        state.dirty = false
        const di = document.getElementById('dirty-indicator')
        if (di) di.textContent = ''
        flashSaved()
      } catch (e) {
        alert(`저장 실패: ${e.message}`)
      }
    }

    function flashSaved() {
      const di = document.getElementById('dirty-indicator')
      if (!di) return
      di.textContent = '✓ 저장됨'
      di.className = 'text-xs text-emerald-400'
      setTimeout(() => {
        di.textContent = ''
        di.className = 'text-xs text-amber-400'
      }, 1500)
    }

    async function runLint() {
      state.lintResult = { code: 0, stdout: '실행 중...', stderr: '' }
      render()
      try {
        const result = await api('/api/lint', { method: 'POST' })
        state.lintResult = result
        render()
      } catch (e) {
        state.lintResult = { code: 1, stdout: '', stderr: e.message }
        render()
      }
    }

    function render() {
      const root = $('#root')
      root.innerHTML = ''
      root.appendChild(renderRegionTabs())
      root.appendChild(
        el('div', { class: 'lay-main flex-1 flex overflow-hidden' },
          renderNodeList(),
          renderEditor(),
        )
      )
    }

    // Keyboard shortcuts: Cmd/Ctrl+S = save, Cmd/Ctrl+J = prev, Cmd/Ctrl+K = next
    document.addEventListener('keydown', (e) => {
      if (!(e.metaKey || e.ctrlKey)) return
      if (e.key === 's') { e.preventDefault(); saveActive(); return }
      if (e.key === 'j' || e.key === 'J') { e.preventDefault(); gotoSibling(-1); return }
      if (e.key === 'k' || e.key === 'K') { e.preventDefault(); gotoSibling(1); return }
    })

    // Warn before navigating away with dirty
    window.addEventListener('beforeunload', (e) => {
      if (state.dirty) {
        e.preventDefault()
        e.returnValue = ''
      }
    })

    loadAll().catch((e) => {
      $('#root').innerHTML = `<div class="p-8 text-red-400">로드 실패: ${e.message}</div>`
    })
  </script>
</body>
</html>
